agent:        xeokit
version:      0.1.0
sdk-target:   2.6.109
display-name: xeokit SDK (BIM/IFC web viewer)
description: |
  Auto-generated agent from `@xeokit/xeokit-sdk@2.6.109` on npm via
  `aware build agent --from-npm`. Reflects the package's TypeScript
  declarations (`.d.ts` files — the vendor-published API contract).

  xeokit is the open-source 3D BIM/IFC viewer SDK from Creoox/xeoLabs.
  Pure WebGL, double-precision world coordinates, used to embed
  interactive 3D model viewers in web applications. Common AECO
  workflows: BIM model preview in browser dashboards, IFC viewer
  panels in construction document review, in-context navigation of
  large federated models, take-screenshot snapshots from automated
  pipelines.

  Covers 98 classes × 361 methods reflected from the public .d.ts
  surface: Viewer, Scene, Camera, CameraControl, plugins (Annotations,
  XKTLoader, IFCLoader, GLTFLoader, BCFViewpoints, SectionPlanes,
  ContextMenu, etc.), and the math/geometry utilities.

  Note: the **xeokit-sdk JS library itself is AGPL-3.0** (commercial
  license available from Creoox for non-AGPL use). This AWARE agent
  contains *generated documentation* of the public API (method names
  + parameter types), which is original work licensed Apache-2.0. The
  vendor library is **not** redistributed; users install it themselves
  via `npm install @xeokit/xeokit-sdk` and AWARE composes against it.

  Marked `stateful: false` — typical xeokit usage is request/response
  (load model → query → snapshot). A curator could later flag the
  `new Viewer(cfg)` constructor path as a `start` command for stateful
  long-running viewer apps.

stateful: false

vendor:   creoox
license:  Apache-2.0
homepage: https://github.com/aware-aeco/aware/tree/main/20-agents/aeco/visualization/xeokit
keywords: [aeco, visualization, viewer, bim, ifc, 3d, webgl, xeokit, creoox, generated, raw, npm, typescript]

