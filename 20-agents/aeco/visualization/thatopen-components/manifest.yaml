agent:        thatopen-components
version:      0.1.0
sdk-target:   3.4.6
display-name: That Open Components (modern IFC.js — raw)
description: |
  Auto-generated agent from `@thatopen/components@3.4.6` on npm via
  `aware build agent --from-npm`. Reflects the TypeScript public-API
  declarations of That Open Engine's component library — the modern
  open-source successor to IFC.js, the de-facto stack for building
  custom BIM/IFC web applications.

  Covers 80 classes × 337 methods: World / Scene / Camera / Renderer
  abstractions, IFC loaders + relations + properties, classifier &
  fragments management, viewpoints (BCF-compat), measurement /
  dimension / clipping tools, exclusion management.

  Companion to `xeokit` (BIM-focused viewer) and `three` (low-level
  WebGL). Pick `thatopen-components` when you want batteries-included
  IFC handling with React-friendly component composition; `xeokit`
  for performance-tuned IFC viewing of huge models; `three` for raw
  WebGL with no BIM assumptions.

  Library is **MIT-licensed**. AWARE-generated text is Apache-2.0.
  Neither the library nor the types package is redistributed — users
  install `@thatopen/components` themselves via npm.

  Marked `stateful: false` — typical usage is build-world → load-ifc
  → render → query. Long-running viewer apps could curate the
  `new Components()` / `new World()` init paths as `start` later.

stateful: false

vendor:   thatopen
license:  Apache-2.0
homepage: https://github.com/aware-aeco/aware/tree/main/20-agents/aeco/visualization/thatopen-components
keywords: [aeco, visualization, viewer, bim, ifc, web, react, thatopen, generated, raw, npm, typescript, mit]

