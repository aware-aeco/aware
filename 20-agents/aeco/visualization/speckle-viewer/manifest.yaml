agent:        speckle-viewer
version:      2.28.0
display-name: Speckle Viewer (raw)
description: |
  Auto-generated agent from `@speckle/viewer@2.28.0` on npm via
  `aware build agent --from-npm`. Reflects the TypeScript public-API
  declarations of Speckle's 3D viewer — the visualization layer of
  the open-source AECO data platform that aggregates models / data /
  changes across Revit, Rhino, Grasshopper, Tekla, IFC, GIS, and
  everything else AECO touches.

  Covers 124 classes × 942 methods: Viewer / SpeckleViewer / model
  loaders (.speckle streams via the Speckle API + commit / branch /
  object refs), pipeline (passes / postprocessing — SAO, FXAA, SSAO),
  filtering (color / isolate / hide by property), cameras
  (perspective + orthographic + section box), measurements, point
  cloud + mesh / line / pointcloud / text rendering primitives.

  Companion to the rest of the visualization vertical:
  - `xeokit`             — heavy BIM viewer SDK
  - `three`              — low-level WebGL
  - `thatopen-components` — modern IFC.js stack
  - `web-ifc`            — WASM IFC parser
  - `speckle-viewer`     — open AECO data platform viewer (you)

  Speckle is **Apache-2.0** — the most permissive of the bunch.
  AWARE-generated text here is also Apache-2.0. The library is not
  redistributed; users install `@speckle/viewer` themselves via npm.

  Marked `stateful: false` — typical Speckle workflow is
  load-stream → render → query. Long-running speckle apps could later
  curate the `new Viewer(canvas)` init path as `start`.

stateful: false

vendor:   speckle
license:  Apache-2.0
homepage: https://github.com/aware-aeco/aware/tree/main/20-agents/aeco/visualization/speckle-viewer
