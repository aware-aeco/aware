  Apache-2.0. The library is not redistributed; users install
  `@itwin/core-frontend` themselves via npm.

  Marked `stateful: false` — typical iTwin workflow is open-iModel
  → query → render → commit changes. Long-running viewer apps could
  flag `IModelApp.startup()` / `IModelConnection.open()` as `start`.

