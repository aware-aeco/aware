agent:        three
version:      0.184.1
display-name: three.js (raw)
description: |
  Auto-generated agent from `@types/three@0.184.1` on npm via
  `aware build agent --from-npm`. Reflects the TypeScript public-API
  declarations of three.js — the foundational WebGL 3D library that
  powers a huge slice of the AECO web-visualization ecosystem
  (BIMviewer, IFC.js, Speckle viewer, Cesium add-ons, custom
  in-house viewers).

  Covers 511 classes × 2,860 methods reflected from the .d.ts surface:
  Scene / Camera / WebGLRenderer / Mesh / Material / Geometry /
  Texture / Light / Loader (GLTFLoader, OBJLoader, FBXLoader, …) /
  Controls (OrbitControls, TrackballControls, …) and all the math
  primitives (Vector3, Matrix4, Quaternion, Euler, …).

  three.js is **MIT-licensed**. The `@types/three` package
  (DefinitelyTyped) is also MIT. AWARE-generated text here (method
  names + parameter types reflected from the public type
  declarations) is Apache-2.0. Neither the library nor the
  type-definitions package is redistributed — users install
  `three` themselves via `npm install three`.

  Marked `stateful: false` because typical three.js usage is
  request/response (build scene → render → repeat). For
  long-running render loops, a curator could later tag a
  `new WebGLRenderer(cfg)` / `scene.add(...)` path as `start`.

stateful: false

vendor:   mrdoob
license:  Apache-2.0
homepage: https://github.com/aware-aeco/aware/tree/main/20-agents/aeco/visualization/three
keywords: [aeco, visualization, viewer, 3d, webgl, three, mrdoob, generated, raw, npm, typescript, mit]

