agent:        web-ifc
version:      0.0.77
display-name: web-ifc (WebAssembly IFC parser — raw)
description: |
  Auto-generated agent from `web-ifc@0.0.77` on npm via
  `aware build agent --from-npm`. Reflects the TypeScript public-API
  declarations of the WebAssembly-backed IFC parser used as the
  foundation under both `@thatopen/components` and many AECO web
  apps.

  Covers 19 classes × 120 methods: IfcAPI (Open/Close model, read
  property sets, iterate geometry), property-by-handle / -by-type
  lookups, geometry tessellation streams, IFC4 / IFC2x3 entity
  navigation.

  Use when you want a thin, fast IFC reader without the React /
  Three.js abstractions of `thatopen-components`. Common workflows:
  IFC → JSON conversion pipelines, server-side property extraction,
  custom geometry processing.

  Library is **MPL-2.0** (Mozilla Public License — permissive with
  file-level copyleft on modifications to the library itself).
  AWARE-generated text here is Apache-2.0. The library is not
  redistributed; users install `web-ifc` themselves.

stateful: false

