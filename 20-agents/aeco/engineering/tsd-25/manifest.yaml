agent:        tsd-25
version:      25.3.0
display-name: Tekla Structural Designer 25 (raw — Remoting API)
description: |
  Auto-generated agent from `TeklaStructuralDesigner.RemotingAPI@25.3.0`
  on NuGet via `aware build agent --from-nuget`. Reflects the .NET
  Remoting bridge that external apps use to drive Tekla Structural
  Designer 25.

  TSD (Tekla Structural Designer) is Trimble's integrated structural
  analysis + design tool for buildings — concrete frames, steel
  frames, post-tensioned slabs, code-check per EN/AISC/ACI.
  Workflow-pair with Tekla Structures (detailing) and IDEA StatiCa
  (connection design).

  Covers 42 classes × 440 commands: model element creation
  (columns / beams / walls / slabs / foundations), load definitions,
  load combinations, analysis runs, results extraction, design check
  results, report generation hooks.

  Vendor-proprietary library; AWARE-generated text is Apache-2.0.
  Users need their own TSD installation + license.

  Companion to `tsd-26`. Sibling Trimble products under the same
  AECO umbrella: `tekla` (curated, detailing), `tekla-2025`/`2026`
  (raw, detailing), `trimble-connect` (curated, CDE), `sketchup-2025`/
  `2026` (raw, conceptual design).

  Marked `stateful: false` — remoting calls are request/response.
  Curators of long-running analysis workflows would later flag the
  `RemoteServer.Connect()` path as `lifecycle: start`.

stateful: false

vendor:   trimble
license:  Apache-2.0
