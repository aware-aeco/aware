agent:        tekla-2025
version:      2025.0.0
display-name: Tekla Structures 2025 (raw)
description: |
  Auto-generated agent from Tekla Structures 2025.0's
  `Tekla.Structures.Model.dll` via `aware build agent --from-dlls`. Pure
  API-surface reflection — method names, parameter types, and lifecycle
  markers only. No vendor XML doc summaries (queued for v0.6.2).

  Sibling to the hand-curated `tekla` agent. The curated one has 31
  hand-written skills covering Tekla-specific gotchas. This one is 18
  skills × 3,004 commands covering the entire public API surface — no
  judgment about which APIs matter, no Tekla-specific lore.

  Trimble's Tekla Open API is documented at https://developer.tekla.com/.
  The proprietary `.dll` is not redistributed; only its public reflection
  metadata is.

  Marked `stateful: false` because raw reflection has no way to identify
  the session-start method; whoever curates this into a workflow-ready
  agent will flip one command's lifecycle to `start` and the rest to
  `single` / `child` / `stop` as appropriate.

stateful: false

