agent:        tekla-2025
version:      2025.0.0
display-name: Tekla Structures 2025 (raw)
description: |
  Auto-generated agent from `Tekla.Structures.Model@2025.0.0` on NuGet
  via `aware build agent --from-nuget`. Reflects the vendor-curated
  reference assemblies (the public-API contract — `ref/` DLLs) of
  Trimble's Tekla Open API.

  Sibling to the hand-curated `tekla` agent. The curated one has 31
  hand-written skills covering Tekla-specific gotchas. This one is the
  full reflected public API surface — no judgment, no Tekla-specific
  lore, just every public method/type the SDK exposes.

  Marked `stateful: false` because raw reflection has no way to
  identify the session-start method; curators flip lifecycles when
  refining.

stateful: false

vendor:   trimble
license:  Apache-2.0
