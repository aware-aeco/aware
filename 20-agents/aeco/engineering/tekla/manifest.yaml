agent:        tekla
version:      0.1.0
sdk-target:   2025+         # version-agnostic shorthand; structured form lands in hardening pass
display-name: Tekla Structures

# Desktop-host metadata (see 10-core/desktop-host-sidecar-spec.md).
# The runtime sidecar `aware-tekla.exe` reads this to pre-flight check
# whether a matching host instance is running before invoking verbs.
host:
  exe-name:           TeklaStructures.exe
  versions-supported: [2025.x, 2026.x]
  routing:            com-rot
  runtime-tfm:        net48              # CRITICAL: see skills/runtime-bridge-dotnet-framework.md
  dll-probe-paths:                       # ordered list — first match wins
    - "{host_install}/bin/Net48Runtime"  # Tekla 2026+ dual-runtime layout
    - "{host_install}/bin"               # Tekla 2025 and earlier

description: |
  Watches the active Tekla model, reads its state, and writes back via the
  Tekla Open API. Auto-generated from Tekla Structures 2025.0 DLLs and
  refined by hand to capture Tekla-specific gotchas the API surface alone
  doesn't expose (Mark vs Name, event threading, coordinate systems).

stateful: true

vendor:   trimble
license:  Apache-2.0
homepage: https://github.com/aware-aeco/aware/tree/main/20-agents/aeco/engineering/tekla
keywords: [aeco, engineering, structural, bim, tekla, trimble]

provenance:
  generated-by:     aware-agent-builder
  generator-version: 0.1.0
  source:
    type: dlls
    path: "C:/Program Files/Tekla Structures/2025.0/bin/Tekla.*.dll"
    docs: "https://www.nuget.org/packages/Tekla.Structures.Model/2025.0.0"
  refined-by:       [pawellisowski, wojciechmleczek]
  generated-at:     2026-04-01T00:00:00Z

requires:
  network:
    - localhost:9999       # Tekla COM bridge
  software:
    - tekla-structures@2025.x

transport:
  cli:
    binary: aware-tekla

commands:
  send-status:
    lifecycle: single
    category: curated
    description: |
      Display a transient message in Tekla's status bar via
      Operation.DisplayPrompt(message). Stable across Tekla 2025 / 2026.
      Useful as a connection smoke-test and for non-blocking user feedback
      during long-running compositions. Idempotent.
    inputs:
      message:
        type: string
        max-length: 256
    outputs:
      type: single
      schema:
        delivered_at:  string
        tekla_pid:     integer
        tekla_version: string

  launch:
    lifecycle: single
    category: curated
    description: |
      Start a Tekla Structures instance headless (no setup dialog) via
      a `Bypass.ini` file. See skills/headless-startup-and-shutdown.md
      for the full reference. Returns immediately after process start —
      caller polls `send-status` to detect Open API readiness (~30s
      typical with a small / blank model). Window opens maximized so
      subsequent status-bar messages are visually verifiable.

      Inputs are optional with sensible defaults — at minimum supply
      `version`. If you supply `environment` + `license` (+ optional
      `role`) the sidecar generates a Bypass.ini for you under
      `%TEMP%\\aware-tekla\\`. If you supply a pre-built `bypass_ini`
      path, that path is used verbatim and the other env / license / role
      fields are ignored.
    inputs:
      version:
        type: string
        required: true
        example: "2026.0"
      model_path:
        type: string
        required: false
        description: Open this existing model after startup
      bypass_ini:
        type: string
        required: false
        description: Pre-built Bypass.ini path; mutually exclusive with environment/license/role
      environment:
        type: string
        required: false
        example: "blank_project"
        description: Tekla environment slug (used to generate Bypass.ini if bypass_ini not given)
      license:
        type: string
        required: false
        example: "Partner"
        description: XS_DEFAULT_LICENSE value (Partner | DIAMOND | GRAPHITE | CARBON | FULL)
      role:
        type: string
        required: false
        description: Full XS_DEFAULT_ROLE path; defaults to %XSDATADIR%\\Environments\\default\\role_Engineer.ini
    outputs:
      type: single
      schema:
        host_pid:     integer
        host_version: string
        bypass_ini:   string
        model_path:   string
        maximized:    boolean
        note:         string

  watch:
    lifecycle: start
    category: curated
    description: Subscribe to ModelObjectChanged events on the active Tekla model.
    inputs:
      filter:
        type: enum
        values: [all, welded, bolted, assembly]
        default: all
        # Matches the changed object's kind: welded→Weld objects,
        # bolted→Bolt* objects, assembly→Assembly. (Drawing changes are not
        # surfaced by ModelObjectChanged — they need Tekla.Structures.Drawing
        # events, a separate stream not yet wired here.)
      include-deleted:
        type: boolean
        default: false
        description: Also emit on OBJECT_DELETE (removed). Default drops deletions.
    outputs:
      type: stream
      # The data stream carries one change event per line. Live trigger state
      # (subscribed↔fired) is observable from the run's NodeStart/NodeOutput
      # events, not in-band (an in-band control record would propagate downstream
      # as a phantom change).
      schema:
        signal:   string             # always "fired" on the data stream
        guid:     string
        mark:     string             # NOTE: identity is Mark, never Name
        type:     string             # changed object's runtime type (Beam, Assembly, Weld, …)
        change:   string             # added | modified | removed
        geometry: object             # best-effort bounding box { min, max } in the CURRENT transformation plane (= world when the work plane is global)

  insert:
    lifecycle: single
    category: curated
    description: Create a ConnectionPart at a world-space location.
    inputs:
      type:
        type: string
        description: Tekla connection catalog name (e.g. "End plate 144")
      position:
        type: object
        schema:
          x: number
          y: number
          z: number
      beams:
        type: array
        items: string                # GUIDs of beams to attach
    outputs:
      type: single
      schema:
        guid: string

  exec:
    lifecycle: single
    category: curated
    mode: write              # conservative default — exec runs arbitrary C#
    mode-overridable: true   # ...but an app node may declare mode: read for a read-only script (#165)
    description: |
      Compile + run an arbitrary C# script against the active Tekla model
      via Roslyn scripting. The bridge between the v0.30 catalog (data) and
      the live Tekla host (execution). The orchestrator reads the catalog
      to discover the type surface, drafts a snippet, ships it through
      this verb. Auto-commits via Model.CommitChanges() on success;
      uncommitted state is dropped on script exception. See exec.md.
    inputs:
      code:
        type: string
        required: true
        description: |
          C# script body. Optional trailing `return X;` makes the value
          appear as the receipt's `result` field. Pre-imported namespaces:
          System, System.Collections.Generic, System.Linq, plus Tekla.*
          (Model, Operations, Geometry3d, Drawing, Datatype).
      version:
        type: string
        required: false
        example: "2026.0"
        description: |
          Tekla version. Used to discover {host_install} and load the
          matching Tekla.Structures.*.dll set per dll-probe-paths. Omit
          for primitive smoke tests that never touch Tekla types.
      args:
        type: object
        required: false
        description: |
          Free-form input bag. Exposed to the script as
          `IDictionary<string,object> args`.
    outputs:
      type: single
      schema:
        ok:           boolean
        result:       any                # JSON; defensively serialized
        error:        string             # only when ok=false
        stack:        string             # only when ok=false
        delivered_at: string

  save-attributes:
    lifecycle: single
    category: curated
    description: Persist the active dialog's values via the Akit save-as pattern.
    inputs:
      joint-id: string               # e.g. "144" for End plate 144
      filename: string               # name (no extension); written to <model>/attributes/<name>.j<id>
    outputs:
      type: single
      schema:
        path: string

  # ---- v0.16 curated workflow verbs (detailer audit) -------------------

  drawing-list:
    lifecycle: single
    category: curated
    description: |
      Filter drawings in the active model by status / phase / lot /
      IsReadyForIssue. Read-only. The foundation for every other
      drawing-side workflow.
    inputs:
      status:
        type: enum
        values: [any, in-progress, for-checking, issued, issued-but-modified]
        default: any
      phase:
        type: string
        description: Optional Tekla phase number / name.
      lot:
        type: string
        description: Optional fab lot identifier.
    outputs:
      type: single
      schema:
        drawings:
          type: array
          items:
            id:                string
            mark:              string
            title:             string
            up-to-date-status: string
            is-ready-for-issue: boolean
            is-issued:         boolean
            current-revision:  string

  drawing-export:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Batch-export drawings to PDF + DWG with a naming-template. Replaces
      the 30-line `Operation.RunMacro("ExportDrawing")` dance. Honors
      the project's drawing-number standard. Write-mode (filesystem).
    inputs:
      marks:
        type: array
        items: string
        description: Drawing marks to export (e.g. ["A-100","A-101"]).
      formats:
        type: array
        items: string
        default: [pdf, dwg]
      output-dir: string
      naming-template:
        type: string
        default: "{project}-{phase}-{mark}-Rev{rev}.{ext}"
    outputs:
      type: single
      schema:
        written:
          type: array
          items:
            mark:        string
            format:      string
            path:        string

  drawing-issue:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Set IsReadyForIssue → true, set IssuingDate, stamp revision, mark
      prior revision superseded. Write-mode against the Tekla drawing
      database — requires `safety:` block (per v0.11 contract).
    inputs:
      marks:
        type: array
        items: string
      revision: string                # e.g. "E"
      issued-for:
        type: string                  # e.g. "Issued for Construction"
      issued-by:
        type: string
      revision-date:
        type: string                  # ISO; defaults to today
    outputs:
      type: single
      schema:
        issued:
          type: array
          items:
            mark:     string
            revision: string

  drawings-affected-by-revision:
    lifecycle: single
    category: curated
    description: |
      Given a model change (delta from previous save / IFC diff), report
      which drawings reference the affected GUIDs. The revision-cloud
      propagation primitive. Read-only.
    inputs:
      changed-guids:
        type: array
        items: string
    outputs:
      type: single
      schema:
        affected-drawings:
          type: array
          items:
            mark:    string
            reason:  string

  nc-export:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Export NC files (DSTV `.nc1`) for selected parts. The detailer
      Friday-afternoon "saw-line for Monday" verb. Pair with
      `peddinghaus-translator.to-peddimat` if the controller wants
      Peddimat dialect.
    inputs:
      phase:
        type: string
        description: Optional Tekla phase filter.
      part-types:
        type: array
        items: string
        default: [beam, column, brace, plate, bent-plate]
      output-dir: string
    outputs:
      type: single
      schema:
        written:
          type: array
          items:
            part-mark:  string
            profile:    string
            length-mm:  number
            path:       string

  nc-export-phase:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Convenience wrapper: nc-export scoped to one phase, with the
      bucket-by-machine output structure the shop floor expects.
      Combines `nc-export` + `peddinghaus-translator.group-by-machine`
      in one verb.
    inputs:
      phase:       string
      output-dir:  string
      kerf-mm:
        type: number
        default: 3.0
    outputs:
      type: single
      schema:
        manifest-csv: string
        piece-count:  number

  report-create:
    lifecycle: single
    category: curated
    description: |
      Generate a Tekla report from a `.tpl` template against selected /
      all model objects. Wraps `Operation.CreateReportFromAll` /
      `CreateReportFromSelected`. The bolt-list / weld-list / part-list /
      assembly-list source verb. Read-only.

      Emits the report **file path** + `row-count` — not the rows
      themselves. To land the data in a spreadsheet, upload the file then
      `microsoft-365.excel.range.read` it, or read it locally and feed
      `excel.range.write`. (A future `include-rows` flag may emit parsed
      `rows` directly; tracked in #103.)
    inputs:
      template:
        type: string
        description: Template name (`.tpl` in `XS_TEMPLATE_DIRECTORY`).
      selection:
        type: enum
        values: [all, selected, phase]
        default: all
      phase:
        type: string
        description: Required if selection=phase.
      output-path: string
    outputs:
      type: single
      schema:
        path:        string
        row-count:   number

  bolt-list:
    lifecycle: single
    category: curated
    description: |
      Export bolt schedule grouped by diameter / length / grade.
      Specialised wrapper around report-create with the standard
      `bolt-list.tpl` template. Read-only.
    inputs:
      scope:
        type: enum
        values: [all, selected, phase]
        default: all
      phase:
        type: string
      output-path: string
    outputs:
      type: single
      schema:
        path:       string
        row-count:  number
        total-bolts: number

  weld-list:
    lifecycle: single
    category: curated
    description: |
      Export weld schedule (type, length, throat, AWS code symbol) per
      assembly. Specialised wrapper around report-create with the
      standard `weld-list.tpl`. Read-only.
    inputs:
      scope:
        type: enum
        values: [all, selected, phase]
        default: all
      phase:
        type: string
      output-path: string
    outputs:
      type: single
      schema:
        path:       string
        row-count:  number

  part-list:
    lifecycle: single
    category: curated
    description: Per-part schedule (profile / length / grade). Read-only.
    inputs:
      scope:
        type: enum
        values: [all, selected, phase]
        default: all
      phase:
        type: string
      output-path: string
    outputs:
      type: single
      schema:
        path:      string
        row-count: number

  assembly-list:
    lifecycle: single
    category: curated
    description: Per-assembly schedule (mark / type / weight / piece-count). Read-only.
    inputs:
      scope:
        type: enum
        values: [all, selected, phase]
        default: all
      phase:
        type: string
      output-path: string
    outputs:
      type: single
      schema:
        path:      string
        row-count: number

  ifc-export:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Export the model (or a phase) to IFC. Used for MEP-clash federation
      and consultant deliveries. Write-mode (filesystem).
    inputs:
      output-path: string
      scope:
        type: enum
        values: [all, selected, phase]
        default: all
      phase:
        type: string
      ifc-version:
        type: enum
        values: [IFC2x3, IFC4, IFC4X3]
        default: IFC4
      reference-only:
        type: boolean
        default: false
        description: If true, exports outline only (no internal detail).
    outputs:
      type: single
      schema:
        path:       string
        entity-count: number

  numbering-run:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Run Tekla's numbering operation. Choose `modified-only` (fast,
      typical) or `all` (forced renumber). Write-mode — changes
      assembly + part marks across the model.
    inputs:
      mode:
        type: enum
        values: [modified-only, all]
        default: modified-only
    outputs:
      type: single
      schema:
        renumbered: number
        warnings:
          type: array
          items: string

  uda-get:
    lifecycle: single
    category: curated
    description: |
      Read a user-defined attribute from one or more model objects.
      Read-only.
    inputs:
      guids:
        type: array
        items: string
      uda-name:
        type: string
    outputs:
      type: single
      schema:
        values:
          type: array
          items:
            guid:  string
            value: string

  uda-set:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Write a user-defined attribute on one or more model objects.
      Used by safety-stamp audit-stamp blocks (writes AWARE_RUN_ID etc.).
    inputs:
      guids:
        type: array
        items: string
      uda-name:  string
      value:     string
    outputs:
      type: single
      schema:
        updated: number

  uda-copy:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Copy a UDA value from one object to another (or from a UDA to a
      different UDA on the same object). Useful for migrating phase /
      lot / shipping-week attributes.
    inputs:
      source-guids:
        type: array
        items: string
      target-guids:
        type: array
        items: string
      source-uda: string
      target-uda: string
    outputs:
      type: single
      schema:
        copied: number

  clash-check:
    lifecycle: single
    category: curated
    description: |
      Run Tekla's built-in clash check. Returns clashes grouped by
      severity. For external federation clash, use the
      `navisworks-2026.clash.run-all` agent instead. Read-only.
    inputs:
      scope:
        type: enum
        values: [all, selected, phase]
        default: all
      phase:
        type: string
    outputs:
      type: single
      schema:
        clashes:
          type: array
          items:
            mark-a:   string
            mark-b:   string
            severity: string

