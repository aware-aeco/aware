agent:        csi-api
version:      2.12.0
display-name: CSi API (SAP2000 / ETABS / SAFE / CSiBridge — raw)
description: |
  Auto-generated agent from `CSiAPIv1-All@2.12.0` on NuGet via
  `aware build agent --from-nuget`. Reflects the vendor-published .NET
  API surface for Computers & Structures Inc's structural-analysis
  product line:

  - **SAP2000** — general-purpose structural analysis & design (4,282
    cmds across 2 skills capturing the unified v1 API covering all 4
    products listed below)
  - **ETABS** — building structural analysis
  - **SAFE** — slab & foundation design
  - **CSiBridge** — bridge design

  Covers the load case / nonlinear / time-history / response-spectrum /
  steel & concrete design / model definition / results extraction APIs
  used by structural engineers working with concrete, steel, masonry,
  cold-formed, and timber.

  CSi's API is **vendor-proprietary**; the NuGet package republishes
  the reference DLLs only. AWARE-generated text here (method names +
  parameter types) is Apache-2.0. Neither the DLL nor an active CSi
  license is shipped — users need their own SAP2000 / ETABS / SAFE /
  CSiBridge installation to actually run the agent's commands.

  Marked `stateful: false` because raw reflection has no way to
  identify the session-start method; a curator working with CSi APIs
  would flip the model-open / new-model path to `lifecycle: start`
  for stateful workflows.

stateful: false

