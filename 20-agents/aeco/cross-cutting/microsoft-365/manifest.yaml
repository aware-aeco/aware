agent:        microsoft-365
version:      0.2.0
sdk-target:   1.0.0
display-name: Microsoft 365 (Graph API)
description: |
  Read and write across the Microsoft 365 surface — OneDrive, SharePoint,
  Outlook, Teams, Calendar — via the Microsoft Graph REST API. Auto-generated
  from the public Graph OpenAPI spec + refined to capture auth, throttling,
  and sharing-URL conventions the spec alone doesn't encode.

  Cross-cutting in AECO (used by architecture, engineering, construction,
  and operations alike — file sharing, RFI emails, drawing index sheets in
  SharePoint, Teams channels for project comms).

stateful: false

vendor:   microsoft
license:  Apache-2.0
homepage: https://github.com/aware-aeco/aware/tree/main/20-agents/aeco/cross-cutting/microsoft-365
keywords: [aware, m365, microsoft-365, graph, sharepoint, onedrive, teams, outlook, cross-cutting]

provenance:
  generated-by:     aware-agent-builder
  generator-version: 0.1.0
  source:
    type: openapi
    url:  https://github.com/microsoftgraph/msgraph-metadata/blob/master/openapi/v1.0/openapi.yaml
  refined-by:       [pawellisowski]
  generated-at:     2026-04-01T00:00:00Z
  ported-from:      D:/Repos/floless-app/src/FloLess/Core/Skills/Resources/M365/

requires:
  network:
    - https://graph.microsoft.com
    - https://login.microsoftonline.com
  secrets:
    - microsoft-365       # cross-references ~/.aware/credentials/microsoft-365.json

transport:
  cli:
    binary: aware-m365
  rest:
    base: https://graph.microsoft.com/v1.0/

commands:
  # ---- Drive / SharePoint Files (the original 4) ------------------------

  get-drive-item:
    lifecycle: single
    category: curated
    description: Resolve a file or folder by id, path, or sharing URL.
    inputs:
      drive-id:
        type: string
        description: Optional. If omitted, uses the user's default drive.
      item-id:    string
      sharing-url:
        type: string
        description: Optional alternative to item-id. Encoded automatically.
    outputs:
      type: single
      schema:
        id:          string
        name:        string
        size:        number
        is-folder:   bool
        web-url:     string
        download-url: string

  download-file:
    lifecycle: single
    category: curated
    description: Download a OneDrive / SharePoint file's bytes.
    inputs:
      drive-id: string
      item-id:  string
    outputs:
      type: single
      schema:
        bytes:    bytes
        filename: string
        size-kb:  number

  upload-file:
    lifecycle: single
    category: curated
    mode: write
    description: Upload bytes as a new file. Uses simple (≤ 4MB) or resumable (large file) upload depending on size.
    inputs:
      drive-id:  string
      folder-id: string
      filename:  string
      bytes:     bytes
    outputs:
      type: single
      schema:
        item-id: string
        web-url: string

  list-folder:
    lifecycle: single
    category: curated
    description: List children of a folder.
    inputs:
      drive-id:  string
      folder-id: string
    outputs:
      type: single
      schema:
        items:
          type: array
          items:
            id:        string
            name:      string
            size:      number
            is-folder: bool

  # ---- Teams ------------------------------------------------------------

  teams.chat.post-message:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Post a message to a 1:1 or group chat. Returns the messageId for
      reply threading. Throttling: Microsoft Graph caps a chat-message
      POST at ~1 request/sec per user for a given chat; the transport
      honors Retry-After on 429.
    inputs:
      chat-id:
        type: string
        description: Chat id or `me` to use the user's default 1:1.
      text:
        type: string
        description: Plain text or HTML (set content-type accordingly).
      content-type:
        type: enum
        values: [text, html]
        default: text
    outputs:
      type: single
      schema:
        message-id: string
        web-url:    string

  teams.channel.post-message:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Post a plain message to a Teams channel. The bread-and-butter
      "Monday standup digest" command. Honors team + channel display
      names (auto-resolves to IDs).
    inputs:
      team-id:
        type: string
        description: Team id OR team display name.
      channel-id:
        type: string
        description: Channel id OR channel display name.
      text:
        type: string
      content-type:
        type: enum
        values: [text, html]
        default: text
    outputs:
      type: single
      schema:
        message-id: string
        web-url:    string

  teams.channel.post-with-card:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Post an Adaptive Card to a Teams channel. Cards render rich data
      tables, action buttons, status indicators. The right primitive for
      the BIM-manager Monday-model-audit rollup, RFI digests, sheet-
      status reports.
    inputs:
      team-id:    string
      channel-id: string
      title:      string
      rows:
        type: array
        description: |
          Rows are objects with arbitrary fields; the transport renders
          them as a TextBlock + FactSet card. For richer layouts, pass
          a literal AdaptiveCard JSON in `card` instead.
      card:
        type: object
        description: |
          Optional raw AdaptiveCard JSON. If provided, `rows` is ignored.
    outputs:
      type: single
      schema:
        message-id: string
        web-url:    string

  teams.channel.post-with-screenshot:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Post a message to a Teams channel with an attached image. The
      designer-Monday-shot + architect-RFI-with-screenshot primitive.
      Image must be ≤ 4 MB (Graph limit).
    inputs:
      team-id:         string
      channel-id:      string
      text:            string
      screenshot-path: string
    outputs:
      type: single
      schema:
        message-id: string
        web-url:    string

  # ---- Outlook ----------------------------------------------------------

  outlook.mail.send:
    lifecycle: single
    category: curated
    mode: write
    description: Send an email. Plain text or HTML, with optional CC / BCC.
    inputs:
      to:
        type: array
        items: string
      cc:
        type: array
        items: string
      bcc:
        type: array
        items: string
      subject:
        type: string
      body:
        type: string
      content-type:
        type: enum
        values: [text, html]
        default: text
      from:
        type: string
        description: |
          Optional `from` address — defaults to the authenticated user.
          Requires `Mail.Send.Shared` scope for shared mailboxes.
    outputs:
      type: single
      schema:
        message-id: string

  outlook.mail.send-with-attachment:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Send an email with file attachments. Each attachment ≤ 4 MB simple,
      ≤ 150 MB resumable. Transport picks the upload mode automatically.
    inputs:
      to:
        type: array
        items: string
      subject: string
      body:    string
      content-type:
        type: enum
        values: [text, html]
        default: text
      attachments:
        type: array
        items:
          path:     string
          filename: string
    outputs:
      type: single
      schema:
        message-id: string

  outlook.mail.search:
    lifecycle: single
    category: curated
    description: |
      Search the user's inbox by KQL (Microsoft's keyword query language).
      Examples: `subject:"RFI"`, `from:client@acme.com received:>2026-04-01`.
      Read-only.
    inputs:
      query:
        type: string
      top:
        type: number
        default: 25
    outputs:
      type: single
      schema:
        messages:
          type: array
          items:
            id:           string
            subject:      string
            from:         string
            received-at:  string
            web-url:      string

  outlook.calendar.create-event:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Create a calendar event. Supports attendees, location, online-meeting
      (Teams) auto-create, time zone explicit (avoids ambiguity).
    inputs:
      subject: string
      start:
        type: string
        description: ISO 8601 with offset, e.g. `2026-05-20T14:00:00+01:00`.
      end:
        type: string
      time-zone:
        type: string
        description: IANA name, e.g. `Europe/London`.
      attendees:
        type: array
        items: string
      location:
        type: string
      online-meeting:
        type: boolean
        default: false
    outputs:
      type: single
      schema:
        event-id: string
        web-url:  string

  outlook.calendar.find-availability:
    lifecycle: single
    category: curated
    description: |
      Find free time across a set of attendees within a window. Read-only.
      The "schedule a coordination meeting for the next week" primitive.
    inputs:
      attendees:
        type: array
        items: string
      window-start:
        type: string
        description: ISO 8601.
      window-end:
        type: string
      duration-minutes:
        type: number
        default: 30
    outputs:
      type: single
      schema:
        suggestions:
          type: array
          items:
            start: string
            end:   string

  # ---- Planner ----------------------------------------------------------

  planner.task.create:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Create a Planner task. Optional bucket, assigned-to, due-date.
      The "make a follow-up out of this RFI" / "create training task"
      primitive.
    inputs:
      plan-id:
        type: string
      bucket-id:
        type: string
      title:
        type: string
      assigned-to:
        type: array
        items: string
        description: User principal names or AAD object ids.
      due-date:
        type: string
        description: ISO 8601.
      notes:
        type: string
    outputs:
      type: single
      schema:
        task-id: string
        web-url: string

  planner.task.list:
    lifecycle: single
    category: curated
    description: |
      List tasks in a Plan, optionally filtered by bucket / assignee /
      completion state. Read-only.
    inputs:
      plan-id:    string
      bucket-id:
        type: string
        description: Optional.
      assigned-to:
        type: string
        description: Optional user filter.
      completed:
        type: enum
        values: [any, completed-only, open-only]
        default: any
    outputs:
      type: single
      schema:
        tasks:
          type: array
          items:
            task-id:      string
            title:        string
            assigned-to:  array
            due-date:     string
            percent-complete: number

  planner.task.assign:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Add (or replace) assignees on a Planner task. The "ball-in-court"
      primitive — set who owns the next move.
    inputs:
      task-id: string
      assigned-to:
        type: array
        items: string
      replace:
        type: boolean
        default: false
        description: If false, appends; if true, replaces all assignees.
    outputs:
      type: single
      schema:
        task-id:      string
        assigned-to:  array

  planner.task.complete:
    lifecycle: single
    category: curated
    mode: write
    description: Mark a Planner task complete (percentComplete = 100).
    inputs:
      task-id: string
    outputs:
      type: single
      schema:
        task-id: string

  # ---- SharePoint Lists -------------------------------------------------

  sharepoint.list.read:
    lifecycle: single
    category: curated
    description: |
      Read items from a SharePoint List. The "pull the project roster"
      / "read the door-spec list" primitive. Returns rows as objects
      keyed by column display-name.
    inputs:
      site-id:
        type: string
      list-id:
        type: string
      filter:
        type: string
        description: OData $filter expression. Optional.
      top:
        type: number
        default: 200
    outputs:
      type: single
      schema:
        items:
          type: array
          items: object

  sharepoint.list.append-row:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Append a row to a SharePoint List. Used by ops teams to log app
      runs / RFIs / submittals into a central tracking list.
    inputs:
      site-id: string
      list-id: string
      fields:
        type: object
        description: Map of column display-name → value.
    outputs:
      type: single
      schema:
        item-id: string
        web-url: string

  # ---- Excel range ops --------------------------------------------------

  excel.range.read:
    lifecycle: single
    category: curated
    description: |
      Read a range from a workbook (e.g. `Sheet1!A1:D200`). The engineer-
      load-take-down / architect-bulk-parameter-source primitive.
      Read-only.
    inputs:
      drive-id:
        type: string
      item-id:
        type: string
        description: Workbook file id.
      worksheet:
        type: string
      range:
        type: string
        description: A1-notation, e.g. `A1:D200`.
    outputs:
      type: single
      schema:
        values:
          type: array
          items: array
        row-count:    number
        column-count: number

  excel.range.write:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Write a 2D array of values into a range. Replaces existing cell
      contents. For appending one row, prefer `excel.table.append-row`.
    inputs:
      drive-id:
        type: string
      item-id:
        type: string
      worksheet:
        type: string
      range:
        type: string
      values:
        type: array
        items: array
    outputs:
      type: single
      schema:
        cells-written: number

  excel.worksheet.list:
    lifecycle: single
    category: curated
    description: |
      List worksheet names in a workbook. Pair with `excel.range.read` when
      the worksheet name is unknown ahead of time. Read-only.
    inputs:
      drive-id: string
      item-id:  string
    outputs:
      type: single
      schema:
        worksheets:
          type: array
          items:
            name: string
            id:   string

  excel.worksheet.create:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Add a new worksheet to a workbook, optionally named. The "fresh
      `Phase N` sheet per run" primitive — create the tab, then
      `excel.range.write` into it. If a sheet with the name already exists
      Graph returns 409; catch it with `excel.worksheet.list` first.
    inputs:
      drive-id:
        type: string
      item-id:
        type: string
        description: Workbook file id.
      name:
        type: string
        description: |
          New worksheet name. Optional — Graph auto-names (`Sheet1`, …)
          when omitted. Max 31 chars; `\ / ? * [ ]` are rejected.
    outputs:
      type: single
      schema:
        id:       string
        name:     string
        position: number

  excel.table.append-row:
    lifecycle: single
    category: curated
    mode: write
    description: |
      Append a row to a named Excel Table (not raw range). Tables auto-
      grow + preserve formulas. The "log every QA run / RFI" primitive.
    inputs:
      drive-id:
        type: string
      item-id:
        type: string
      worksheet:
        type: string
      table-name:
        type: string
      values:
        type: array
        description: |
          Single row of values matching the table column order.
    outputs:
      type: single
      schema:
        row-index: number

skills:
  - auth.md
  - graph-excel.md
  - graph-files.md
  - graph-snippets.md
