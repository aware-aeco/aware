agent:        allplan-2024
version:      0.1.0
sdk-target:   2024.0.1.35
display-name: Allplan 2024 (raw)
description: |
  Auto-generated agent from `Allplan.BIF.Core@2024.0.1.35` on NuGet
  via `aware build agent --from-nuget`. Reflects the public-API
  surface of Nemetschek's BIM+ Integration Framework — the .NET
  bridge that custom plugins use to drive Allplan 2024.

  Allplan is Nemetschek's architecture + engineering BIM authoring
  tool — sibling to Revit, ArchiCAD, Vectorworks (also Nemetschek).
  Strong in European AECO markets.

  Covers 87 classes × 1,162 commands: model element creation
  (walls, slabs, columns, beams, openings), parametric attributes,
  geometric primitives, materials, layers, project-context access,
  reinforcement modeling, and the BimPlus cloud integration layer
  (SSO + REST exchange between Allplan and the BimPlus collaboration
  cloud).

  Library is **MIT-licensed** (the open BIF wrapper); Allplan itself
  is vendor-proprietary and not redistributed. AWARE-generated text
  here is Apache-2.0. Users need their own Allplan installation +
  license to actually execute the agent's commands.

  Marked `stateful: false` — Allplan plugin code is typically
  request/response against the running document. Curators of
  long-running session-aware workflows would later flag a
  `new Document(...)` path as `lifecycle: start`.

stateful: false

