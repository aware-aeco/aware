    lifecycle: single
    description: Calculates the boolean difference between two closed, planar curves.              Note, curves must be co-planar.
  curve-create-boolean-intersection:
    lifecycle: single
    description: Calculates the boolean intersection of two closed, planar curves.              Note, curves must be co-planar.
  curve-create-boolean-regions:
    lifecycle: single
    description: Curve Boolean method, which trims and splits curves based on their overlapping regions.
  curve-create-boolean-union:
    lifecycle: single
    description: Calculates the boolean union of two or more closed, planar curves.              Note, curves must be co-planar.
  curve-create-conic-corner-rectangle:
    lifecycle: single
    description: Creates a conic-corned (rounded) rectangular curve.
  curve-create-control-point-curve:
    lifecycle: single
    description: Constructs a curve from a set of control-point locations.
  curve-create-curve2-view:
    lifecycle: single
    description: Creates a third curve from two curves that are planar in different construction planes.              The new curve looks the same as each of the original curves when viewed in each plane.
  curve-create-fillet:
    lifecycle: single
    description: Computes the fillet arc for a curve filleting operation.
  curve-create-fillet-corners-curve:
    lifecycle: single
    description: Rounds the corners of a kinked curve with arcs of a single, specified radius.
  curve-create-fillet-curves:
    lifecycle: single
    description: Creates a tangent arc between two curves and trims or extends the curves to the arc.
  curve-create-interpolated-curve:
    lifecycle: single
    description: Interpolates a sequence of points. Used by InterpCurve Command             This routine works best when degree=3.
  curve-create-match-curve:
    lifecycle: single
    description: Changes a curve end to meet a specified curve with a specified continuity.
  curve-create-mean-curve:
    lifecycle: single
    description: Constructs a mean, or average, curve from two curves.
  curve-create-periodic-curve:
    lifecycle: single
    description: Removes kinks from a curve. Periodic curves deform smoothly without kinks.
  curve-create-revision-cloud:
    lifecycle: single
    description: Creates a revision cloud curve from a planar curve.
  curve-create-soft-edit-curve:
    lifecycle: single
    description: Creates a soft edited curve from an existing curve using a smooth field of influence.
  curve-create-text-outlines:
    lifecycle: single
    description: Creates outline curves created from a text string. The functionality is similar to what you find in Rhino's TextObject command or TextEntity.Explode() in RhinoCommon.
  curve-create-tween-curves:
    lifecycle: single
    description: Creates curves between two open or closed input curves. Uses the control points of the curves for finding tween curves.             That means the first control point of first curve is matched to first control point of the second curve and so on.             There is no matching of curves direction. Caller must match input curves direction before calling the function.
  curve-create-tween-curves-with-matching:
    lifecycle: single
    description: Creates curves between two open or closed input curves. Make the structure of input curves compatible if needed.             Refits the input curves to have the same structure. The resulting curves are usually more complex than input unless             input curves are compatible and no refit is needed. There is no matching of curves direction.             Caller must match input curves direction before calling the function.
  curve-create-tween-curves-with-sampling:
    lifecycle: single
    description: "Creates curves between two open or closed input curves. Use sample points method to make curves compatible.             This is how the algorithm works: Divides the two curves into an equal number of points, finds the midpoint between the              corresponding points on the curves and interpolates the tween curve through those points. There is no matching of curves             direction. Caller must match input curves direction before calling the function."
  curve-curvature-at:
    lifecycle: single
    description: Evaluate the curvature vector at a curve parameter.
  curve-derivative-at:
    lifecycle: single
    description: Evaluate the derivatives at the specified curve parameter.
  curve-divide-as-contour:
    lifecycle: single
    description: Divides this curve at fixed steps along a defined contour line.
  curve-divide-by-count:
    lifecycle: single
    description: Divide the curve into a number of equal-length segments.
  curve-divide-by-length:
    lifecycle: single
    description: Divide the curve into specific length segments.
  curve-divide-equidistant:
    lifecycle: single
    description: Calculates 3d points on a curve where the linear distance between the points is equal.
  curve-do-directions-match:
    lifecycle: single
    description: Determines whether two curves travel more or less in the same direction.
  curve-duplicate:
    lifecycle: single
    description: Constructs an exact duplicate of this Curve.
  curve-duplicate-curve:
    lifecycle: single
    description: Constructs an exact duplicate of this curve.
  curve-duplicate-segments:
    lifecycle: single
    description: Duplicates curve segments.              Explodes polylines, polycurves and G1 discontinuous NURBS curves.             Single segment curves, such as lines, arcs, unkinked NURBS curves, are duplicated.
  curve-extend:
    lifecycle: single
    description: Where possible, analytically extends curve to include the given domain.              This will not work on closed curves. The original curve will be identical to the              restriction of the resulting curve to the original curve domain.
  curve-extend-by-arc:
    lifecycle: single
    description: Extends a curve by an Arc until it intersects a collection of objects.
  curve-extend-by-line:
    lifecycle: single
    description: Extends a curve by a line until it intersects a collection of objects.
  curve-extend-on-surface:
    lifecycle: single
    description: Extends a curve on a surface.
  curve-extreme-parameters:
    lifecycle: single
    description: Returns the parameter values of all local extrema.              Parameter values are in increasing order so consecutive extrema              define an interval on which each component of the curve is monotone.              Note, non-periodic curves always return the end points.
  curve-fair:
    lifecycle: single
    description: Fairs a curve object. Fair works best on degree 3 (cubic) curves. Attempts to              remove large curvature variations while limiting the geometry changes to be no              more than the specified tolerance.
  curve-fillet-surface-to-curve:
    lifecycle: single
    description: Creates a constant-radius fillet surface between a surface and the curve.
  curve-fillet-surface-to-rail:
    lifecycle: single
    description: Creates a surface between two surfaces, with a fixed rail curve on the first surface.
  curve-find-local-inflection:
    lifecycle: single
    description: Local minimization for point on a curve with tangent perpendicular to N.
  curve-fit:
    lifecycle: single
    description: Fits a new curve through an existing curve.
  curve-frame-at:
    lifecycle: single
    description: Returns a 3d frame at a parameter.
  curve-get-conic-section-type:
    lifecycle: single
    description: Returns the type of conic section based on the curve's shape.
  curve-get-curve-parameter-from-nurbs-form-parameter:
    lifecycle: single
    description: Convert a NURBS curve parameter to a curve parameter.
  curve-get-distances-between-curves:
    lifecycle: single
    description: Calculates the minimum and maximum distances between two curves.             This function is useful for computing curve deviation.             If you are not computing curve deviation, use .
  curve-get-fillet-points:
    lifecycle: single
    description: Finds points at which to cut a pair of curves so that a fillet of given radius can be inserted.
  curve-get-length:
    lifecycle: single
    description: Gets the length of the curve with a fractional tolerance of 1.0e-8.
  curve-get-local-perp-point:
    lifecycle: single
    description: Search for a location on the curve, near seedParmameter, that is perpendicular to a test point.
  curve-get-local-tangent-point:
    lifecycle: single
    description: Search for a location on the curve, near seedParmameter, that is tangent to a test point.
  curve-get-next-discontinuity:
    lifecycle: single
    description: Searches for a derivative, tangent, or curvature discontinuity.
  curve-get-nurbs-form-parameter-from-curve-parameter:
    lifecycle: single
    description: Convert a curve parameter to a NURBS curve parameter.
  curve-get-perpendicular-frames:
    lifecycle: single
    description: Gets a collection of perpendicular frames along the curve. Perpendicular frames              are also known as 'Zero-twisting frames' and they minimize rotation from one frame to the next.
  curve-get-sub-curves:
    lifecycle: single
    description: Gets subcurves from a curve.              The results will be similar to what is produced by Rhino's Explode command.
  curve-has-nurbs-form:
    lifecycle: single
    description: Does a NURBS curve representation of this curve exist?
  curve-inflection-points:
    lifecycle: single
    description: Returns a curve's inflection points. An inflection point is a location on             a curve at which the sign of the curvature (i.e., the concavity) changes.              The curvature at these locations is always 0.
  curve-intersections-copy-to:
    lifecycle: single
    description: Copies all intersection results into another array, departing at an index in the target array.
  curve-intersections-dispose:
    lifecycle: single
    description: Actively reclaims unmanaged resources that this instance uses.
  curve-intersections-get-enumerator:
    lifecycle: single
    description: Returns an enumerator that is capable of yielding all IntersectionEvents in the collection.
  curve-is-arc:
    lifecycle: single
    description: Test a curve to see if it can be represented by an arc or circle within RhinoMath.ZeroTolerance.
  curve-is-circle:
    lifecycle: single
    description: Test a curve to see if it can be represented by a circle within RhinoMath.ZeroTolerance.
  curve-is-closable:
    lifecycle: single
    description: Decide if it makes sense to close off this curve by moving the endpoint              to the start based on start-end gap size and length of curve as              approximated by chord defined by 6 points.
  curve-is-continuous:
    lifecycle: single
    description: Test continuity at a curve parameter value.
  curve-is-ellipse:
    lifecycle: single
    description: Test a curve to see if it can be represented by an ellipse within RhinoMath.ZeroTolerance.
  curve-is-in-plane:
    lifecycle: single
    description: Test a curve to see if it lies in a specific plane.
  curve-is-linear:
    lifecycle: single
    description: Test a curve to see if it is linear to within RhinoMath.ZeroTolerance units (1e-12).
  curve-is-planar:
    lifecycle: single
    description: Test a curve for planarity.
  curve-is-polyline:
    lifecycle: single
    description: Several types of Curve can have the form of a polyline             including a degree 1 NurbsCurve, a PolylineCurve,             and a PolyCurve all of whose segments are some form of             polyline. IsPolyline tests a curve to see if it can be             represented as a polyline.
  curve-is-short:
    lifecycle: single
    description: Used to quickly find short curves.
  curve-join-curves:
    lifecycle: single
    description: Joins a collection of curve segments together.
  curve-lcoal-closest-point:
    lifecycle: single
    description: Find parameter of the point on a curve that is locally closest to              the testPoint.  The search for a local close point starts at             a seed parameter.
  curve-length-parameter:
    lifecycle: single
    description: Gets the parameter along the curve which coincides with a given length along the curve.              A fractional tolerance of 1e-8 is used in this version of the function.
  curve-list-add:
    lifecycle: single
    description: Adds a line to this list.
  curve-list-insert:
    lifecycle: single
    description: Inserts a line at a given index of this list.
  curve-list-transform:
    lifecycle: single
    description: Transform all the curves in this list. If at least a single transform failed              this function returns false.
  curve-local-closest-point:
    lifecycle: single
    description: Find parameter of the point on a curve that is locally closest to              the testPoint.  The search for a local close point starts at             a seed parameter.
  curve-make-closed:
    lifecycle: single
    description: "If IsClosed, just return true. Otherwise, decide if curve can be closed as              follows: Linear curves polylinear curves with 2 segments, NURBS with 3 or less              control points cannot be made closed. Also, if tolerance > 0 and the gap between              start and end is larger than tolerance, curve cannot be made closed.              Adjust the curve's endpoint to match its start point."
  curve-make-ends-meet:
    lifecycle: single
    description: Makes adjustments to the ends of one or both input curves so that they meet at a point.
  curve-max-curvature-points:
    lifecycle: single
    description: Returns a curve's maximum curvature points. The maximum curvature points identify             where the curvature starts to decrease in both directions from the points.
  curve-normalized-length-parameter:
    lifecycle: single
    description: Input the parameter of the point on the curve that is a prescribed arc length from the start of the curve.              A fractional tolerance of 1e-8 is used in this version of the function.
  curve-normalized-length-parameters:
    lifecycle: single
    description: Input the parameter of the point on the curve that is a prescribed arc length from the start of the curve.              A fractional tolerance of 1e-8 is used in this version of the function.
  curve-object-duplicate-curve-geometry:
    lifecycle: single
    description: Returns a copy of the underlying curve geometry.
  curve-object-get-linetype-segments:
    lifecycle: single
    description: Converts the linetype pattern of the curve into curve segments and points             based on the active Rhino viewport.
  curve-offset:
    lifecycle: single
    description: Offsets this curve. If you have a nice offset, then there will be one entry in              the array. If the original curve had kinks or the offset curve had self              intersections, you will get multiple segments in the output array.
  curve-offset-normal-to-surface:
    lifecycle: single
    description: Finds a curve by offsetting an existing curve normal to a surface.             The caller is responsible for ensuring that the curve lies on the input surface.
  curve-offset-on-surface:
    lifecycle: single
    description: Offset this curve on a brep face surface. This curve must lie on the surface.
  curve-offset-tangent-to-surface:
    lifecycle: single
    description: Finds a curve by offsetting an existing curve tangent to a surface.             The caller is responsible for ensuring that the curve lies on the input surface.
  curve-perpendicular-frame-at:
    lifecycle: single
    description: Return a 3d frame at a parameter. This is slightly different than FrameAt in             that the frame is computed in a way so there is minimal rotation from one             frame to the next.
  curve-planar-closed-curve-relationship:
    lifecycle: single
    description: Determines whether two coplanar simple closed curves are disjoint or intersect;             otherwise, if the regions have a containment relationship, discovers             which curve encloses the other.
  curve-planar-curve-collision:
    lifecycle: single
    description: Determines if two coplanar curves collide (intersect).
  curve-point-at:
    lifecycle: single
    description: Evaluates point at a curve parameter.
  curve-point-at-length:
    lifecycle: single
    description: Gets a point at a certain length along the curve. The length must be              non-negative and less than or equal to the length of the curve.              Lengths will not be wrapped when the curve is closed or periodic.
  curve-point-at-normalized-length:
    lifecycle: single
    description: Gets a point at a certain normalized length along the curve. The length must be              between or including 0.0 and 1.0, where 0.0 equals the start of the curve and              1.0 equals the end of the curve.
  curve-project-to-brep:
    lifecycle: single
    description: Projects a Curve onto a Brep along a given direction.
  curve-project-to-mesh:
    lifecycle: single
    description: Projects a curve to a mesh using a direction and tolerance.
  curve-project-to-plane:
    lifecycle: single
    description: Constructs a curve by projecting an existing curve to a plane.
  curve-pull-to-brep-face:
    lifecycle: single
    description: Pull a curve to a BrepFace using closest point projection.
  curve-pull-to-mesh:
    lifecycle: single
    description: "Makes a polyline approximation of the curve and gets the closest point on the mesh for each point on the curve.              Then it \"connects the points\" so that you have a polyline on the mesh."
  curve-rebuild:
    lifecycle: single
    description: Rebuild a curve with a specific point count.
  curve-remove-short-segments:
    lifecycle: single
    description: Looks for segments that are shorter than tolerance that can be removed.              Does not change the domain, but it will change the relative parameterization.
  curve-repair:
    lifecycle: single
    description: Repairs a curve.
  curve-reparameterize:
    lifecycle: single
    description: Reparameterizes a curve using automatic parameterization.
  curve-reverse:
    lifecycle: single
    description: Reverses the direction of the curve.
  curve-ribbon-offset:
    lifecycle: single
    description: "Offsets a closed curve in the following way: pProject the curve to a plane with given normal.             Then, loose Offset the projection by distance + blend_radius and trim off self-intersection.             THen, Offset the remaining curve back in the opposite direction by blend_radius, filling gaps with blends.             Finally, use the elevations of the input curve to get the correct elevations of the result."
  curve-set-end-point:
    lifecycle: single
    description: Forces the curve to end at a specified point.              Not all curve types support this operation.
  curve-set-start-point:
    lifecycle: single
    description: Forces the curve to start at a specified point.              Not all curve types support this operation.
  curve-simplify:
    lifecycle: single
    description: Returns a geometrically equivalent PolyCurve.             The PolyCurve has the following properties             1. All the PolyCurve segments are LineCurve, PolylineCurve, ArcCurve, or NurbsCurve.                          2. The NURBS Curves segments do not have fully multiple interior knots.                          3. Rational NURBS curves do not have constant weights.                          4. Any segment for which IsLinear() or IsArc() is true is a Line,                 Polyline segment, or an Arc.                          5. Adjacent co-linear or co-circular segments are combined.                          6. Segments that meet with G1-continuity have there ends tuned up so                that they meet with G1-continuity to within machine precision.
  curve-simplify-end:
    lifecycle: single
    description: "Same as SimplifyCurve, but simplifies only the last two segments at \"side\" end."
  curve-smooth:
    lifecycle: single
    description: Smooths a curve by averaging the positions of control points in a specified region.
  curve-span-domain:
    lifecycle: single
    description: Get the domain of the curve span with the given index.              Use the SpanCount property to test how many spans there are.
  curve-span-vector:
    lifecycle: single
    description: Returns the vector of span division parameters for this curve.
  curve-split:
    lifecycle: single
    description: Splits (divides) the curve at the specified parameter.              The parameter must be in the interior of the curve's domain.
  curve-tangent-at:
    lifecycle: single
    description: Evaluates the unit tangent vector at a curve parameter.
  curve-to-arcs-and-lines:
    lifecycle: single
    description: Converts a curve into polycurve consisting of arc segments. Sections of the input curves that are nearly straight are converted to straight-line segments.
  curve-to-nurbs-curve:
    lifecycle: single
    description: Constructs a NURBS curve representation of this curve.
  curve-to-polyline:
    lifecycle: single
    description: Gets a polyline approximation of a curve.
  curve-torsion-at:
    lifecycle: single
    description: "Evaluate the torsion of a curve at a parameter. Sometimes also called the \"second curvature\",              torsion is the rate of change of a curve's osculating plane."
  curve-trim:
    lifecycle: single
    description: Removes portions of the curve outside the specified interval.
  curve-trim-interval:
    lifecycle: single
    description: Trims the curve in-place by removing portions of the curve outside the specified interval.
  curve-try-get-arc:
    lifecycle: single
    description: Try to convert this curve into an Arc using RhinoMath.ZeroTolerance.
  curve-try-get-circle:
    lifecycle: single
    description: Try to convert this curve into a circle using RhinoMath.ZeroTolerance.
  curve-try-get-ellipse:
    lifecycle: single
    description: Try to convert this curve into an Ellipse within RhinoMath.ZeroTolerance.
  curve-try-get-plane:
    lifecycle: single
    description: Test a curve for planarity and return the plane.
  curve-try-get-polyline:
    lifecycle: single
    description: Several types of Curve can have the form of a polyline              including a degree 1 NurbsCurve, a PolylineCurve,              and a PolyCurve all of whose segments are some form of              polyline. IsPolyline tests a curve to see if it can be              represented as a polyline.
