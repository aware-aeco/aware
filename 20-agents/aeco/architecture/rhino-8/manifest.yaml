    lifecycle: single
    description: Compute the Solid Intersection of two sets of Breps.
  brep-create-boolean-split:
    lifecycle: single
    description: Splits shared areas of Breps and creates separate Breps from the shared and unshared parts.
  brep-create-boolean-union:
    lifecycle: single
    description: Compute the Boolean Union of a set of Breps.
  brep-create-chamfer-surface:
    lifecycle: single
    description: Creates a ruled surface as a bevel between two input surface edges.
  brep-create-contour-curves:
    lifecycle: single
    description: Constructs the contour curves for a brep at a specified interval.
  brep-create-curvature-analysis-mesh:
    lifecycle: single
    description: Create an array of analysis meshes for the brep using the specified settings.             Meshes aren't set on the brep.
  brep-create-developable-loft:
    lifecycle: single
    description: Creates a single developable surface between two curves.
  brep-create-edge-surface:
    lifecycle: single
    description: Constructs a coons patch from 2, 3, or 4 curves.
  brep-create-fillet-edges:
    lifecycle: single
    description: Fillets, chamfers, or blends the edges of a brep.
  brep-create-fillet-edges-variable-radius:
    lifecycle: single
    description: Fillets, chamfers, or blends the edges of a brep.
  brep-create-fillet-surface:
    lifecycle: single
    description: Creates a constant-radius round surface between two surfaces.
  brep-create-from-box:
    lifecycle: single
    description: Constructs new brep that matches a bounding box.
  brep-create-from-cone:
    lifecycle: single
    description: Constructs a Brep representation of the cone with a single             face for the cone, an edge along the cone seam,              and vertices at the base and apex ends of this seam edge.             The optional cap is a single face with one circular edge              starting and ending at the base vertex.
  brep-create-from-corner-points:
    lifecycle: single
    description: Makes a Brep with one face from three corner points.
  brep-create-from-cylinder:
    lifecycle: single
    description: Constructs a Brep definition of a cylinder.
  brep-create-from-joined-edges:
    lifecycle: single
    description: Joins two naked edges, or edges that are coincident or close together, from two Breps.
  brep-create-from-loft:
    lifecycle: single
    description: Constructs one or more Breps by lofting through a set of curves.
  brep-create-from-loft-rebuild:
    lifecycle: single
    description: Constructs one or more Breps by lofting through a set of curves. Input for the loft is simplified by             rebuilding to a specified number of control points.
  brep-create-from-loft-refit:
    lifecycle: single
    description: Constructs one or more Breps by lofting through a set of curves. Input for the loft is simplified by             refitting to a specified tolerance.
  brep-create-from-match:
    lifecycle: single
    description: Match an edge to the target curve using the settings provided
  brep-create-from-mesh:
    lifecycle: single
    description: Create a brep representation of a mesh
  brep-create-from-offset-face:
    lifecycle: single
    description: Offsets a face including trim information to create a new brep.
  brep-create-from-rev-surface:
    lifecycle: single
    description: Constructs a brep form of a surface of revolution.
  brep-create-from-sphere:
    lifecycle: single
    description: Constructs a Brep definition of a sphere.
  brep-create-from-surface:
    lifecycle: single
    description: Constructs a Brep from a surface. The resulting Brep has an outer boundary made             from four trims. The trims are ordered so that they run along the south, east,             north, and then west side of the surface's parameter space.
  brep-create-from-sweep:
    lifecycle: single
    description: Sweep1 function that fits a surface through a profile curve that define the surface cross-sections             and one curve that defines a surface edge.
  brep-create-from-sweep-in-parts:
    lifecycle: single
    description: Makes a 2 rail sweep. Like CreateFromSweep but the result is split where parameterization along a rail changes abruptly.
  brep-create-from-sweep-segmented:
    lifecycle: single
    description: Sweep1 function that fits a surface through a profile curve that define the surface cross-sections             and one curve that defines a surface edge. The Segmented version breaks the rail at curvature kinks             and sweeps each piece separately, then put the results together into a Brep.
  brep-create-from-tapered-extrude:
    lifecycle: single
    description: Extrude a curve to a taper making a brep (potentially more than 1)
  brep-create-from-tapered-extrude-with-ref:
    lifecycle: single
    description: Creates one or more Breps by extruding a curve a distance along an axis with draft angle.
  brep-create-from-torus:
    lifecycle: single
    description: Constructs a Brep definition of a torus.
  brep-create-offset-brep:
    lifecycle: single
    description: Offsets a Brep.
  brep-create-patch:
    lifecycle: single
    description: Constructs a brep patch.             This is the simple version of fit that uses a specified starting surface.
  brep-create-pipe:
    lifecycle: single
    description: Creates a single walled pipe.
  brep-create-planar-breps:
    lifecycle: single
    description: Constructs a set of planar breps as outlines by the loops.
  brep-create-planar-difference:
    lifecycle: single
    description: CreatePlanarDifference
  brep-create-planar-intersection:
    lifecycle: single
    description: CreatePlanarIntersection
  brep-create-planar-union:
    lifecycle: single
    description: CreatePlanarUnion
  brep-create-quad-sphere:
    lifecycle: single
    description: Constructs a Brep definition of a quad sphere.
  brep-create-shell:
    lifecycle: single
    description: Creates a hollowed out shell from a solid Brep. Function only operates on simple, solid, manifold Breps.
  brep-create-solid:
    lifecycle: single
    description: Constructs closed polysurfaces from surfaces and polysurfaces that bound a region in space.
  brep-create-thick-pipe:
    lifecycle: single
    description: Creates a double-walled pipe.
  brep-create-trimmed-plane:
    lifecycle: single
    description: Create a Brep trimmed plane.
  brep-create-trimmed-surface:
    lifecycle: single
    description: Constructs a Brep using the trimming information of a brep face and a surface.              Surface must be roughly the same shape and in the same location as the trimming brep face.
  brep-cull-unused-edges:
    lifecycle: single
    description: Culls edges with m_edge_index == -1.
  brep-cull-unused-faces:
    lifecycle: single
    description: Culls faces with m_face_index == -1.
  brep-cull-unused-loops:
    lifecycle: single
    description: Culls loops with m_loop_index == -1.
  brep-cull-unused-surfaces:
    lifecycle: single
    description: Culls surfaces not referenced by a face.
  brep-cull-unused-trims:
    lifecycle: single
    description: Culls trims with m_trim_index == -1.
  brep-cull-unused-vertices:
    lifecycle: single
    description: Culls vertices with m_vertex_index == -1.
  brep-cull-unused2d-curves:
    lifecycle: single
    description: Culls 3d curves not referenced by an edge.
  brep-cull-unused3d-curves:
    lifecycle: single
    description: Culls 2d curves not referenced by a trim.
  brep-curve-list-add:
    lifecycle: single
    description: Adds a curve
  brep-curve-list-get-enumerator:
    lifecycle: single
    description: Get an enumerator that visits all curves.
  brep-cut-up-surface:
    lifecycle: single
    description: Takes a surface and a set of all 3D curves that define a single trimmed surface,             and splits the surface with the curves, keeping the piece that uses all of the curves.
  brep-destroy-region-topology:
    lifecycle: single
    description: Destroys a Brep's region topology information.
  brep-duplicate:
    lifecycle: single
    description: Copies this brep.
  brep-duplicate-brep:
    lifecycle: single
    description: Same as , but already performs a cast to a brep.             This cast always succeeds.
  brep-duplicate-edge-curves:
    lifecycle: single
    description: Duplicate all the edges of this Brep.
  brep-duplicate-naked-edge-curves:
    lifecycle: single
    description: Duplicate naked edges of this Brep.
  brep-duplicate-sub-brep:
    lifecycle: single
    description: Copy a subset of this Brep into another Brep.
  brep-duplicate-vertices:
    lifecycle: single
    description: Duplicate all the corner vertices of this Brep.
  brep-edge-adjacent-faces:
    lifecycle: single
    description: Gets the indices of all the BrepFaces that use this edge.
  brep-edge-concavity-at:
    lifecycle: single
    description: Determine the concavity of this edge at a specific parameter.
  brep-edge-get-edge-parameter:
    lifecycle: single
    description: Get corresponding edge parameter for given trim at given trim parameter.
  brep-edge-is-smooth-manifold-edge:
    lifecycle: single
    description: For a manifold, non-boundary edge, decides whether or not the two surfaces             on either side meet smoothly.
  brep-edge-list-add:
    lifecycle: single
    description: Create and add a new edge to this list
  brep-edge-list-get-enumerator:
    lifecycle: single
    description: Gets an enumerator that visits all edges.
  brep-edge-list-merge-all-edges:
    lifecycle: single
    description: Merges all possible Brep edges. Edges across kinks cannot be merged.             A pair of adjacent edges in a Brep  are mergeable if the angle between them is less than tolerance and the valence of the shared vertex is 2.
  brep-edge-list-merge-edge:
    lifecycle: single
    description: Merge adjacent edges to a specified edge recursively.             A pair of adjacent edges in a Brep  are mergeable if the angle between them is less than tolerance and the valence of the shared vertex is 2.
  brep-edge-list-remove-naked-micro-edges:
    lifecycle: single
    description: Finds any naked edges with the same start and end vertex and an arc-length less than tolerance             and attempts to remove them by removing trims and extending the adjacent to meet.
  brep-edge-list-split-edge-at-parameters:
    lifecycle: single
    description: Splits an edge at the specified parameters.
  brep-edge-list-split-kinky-edge:
    lifecycle: single
    description: Splits the edge into G1 pieces.
  brep-edge-set-edge-curve:
    lifecycle: single
    description: Set 3d curve geometry used by a b-rep edge.
  brep-edge-trim-indices:
    lifecycle: single
    description: Gets the indices of all trims associated with this edge.
  brep-extend-brep-faces-to-connect:
    lifecycle: single
    description: Extends Faces to meet and trims the faces to each other. If input faces intersect without extending, the selection point indicates the side to keep
  brep-face-adjacent-edges:
    lifecycle: single
    description: Gets the indices of all the BrepEdges that delineate this Face.
  brep-face-adjacent-faces:
    lifecycle: single
    description: Gets the indices of all the BrepFaces that surround (are adjacent to) this face.
  brep-face-change-surface:
    lifecycle: single
    description: Expert user tool that replaces the 3d surface geometry use by the face.
  brep-face-clear-material-channel-index:
    lifecycle: single
    description: Clear this face's rendering material channel index.
  brep-face-clear-pack-id:
    lifecycle: single
    description: Sets BrepFace.PackId to 0.
  brep-face-create-extrusion:
    lifecycle: single
    description: Extrude a face in a Brep.
  brep-face-draft-angle-point:
    lifecycle: single
    description: Returns the surface draft angle and point at a parameter.
  brep-face-duplicate-face:
    lifecycle: single
    description: Duplicate a face from the brep to create new single face brep.
  brep-face-duplicate-surface:
    lifecycle: single
    description: Gets a copy to the untrimmed surface that this face is based on.
  brep-face-fillet-surface-to-curve:
    lifecycle: single
    description: Creates a constant-radius fillet surface between a surface and the curve.
  brep-face-fillet-surface-to-rail:
    lifecycle: single
    description: Creates a surface between two surfaces, with a fixed rail curve on the first surface.
  brep-face-get-mesh:
    lifecycle: single
    description: Obtains a reference to a specified type of mesh for this brep face.
  brep-face-is-point-on-face:
    lifecycle: single
    description: Tests if a parameter space point is in the active region of a face.
  brep-face-list-add:
    lifecycle: single
    description: Create and add a new face to this list. An incomplete face is added.             The caller must create and fill in the loops used by the face.
  brep-face-list-add-cone-face:
    lifecycle: single
    description: Add a new face to the brep whose surface geometry is a              ruled cone with the edge as the base and the vertex as             the apex point.
  brep-face-list-add-ruled-face:
    lifecycle: single
    description: Add a new face to the brep whose surface geometry is a              ruled surface between two edges.
  brep-face-list-clear-per-face-colors:
    lifecycle: single
    description: Removes all per face color overrides on the active level.
  brep-face-list-extract-face:
    lifecycle: single
    description: Extracts a face from a Brep.
  brep-face-list-flip:
    lifecycle: single
    description: Flips the orientation of faces.
  brep-face-list-get-enumerator:
    lifecycle: single
    description: Gets an enumerators that yields  objects.
  brep-face-list-remove-at:
    lifecycle: single
    description: Deletes a face at a specified index.
  brep-face-list-remove-slits:
    lifecycle: single
    description: Remove slit trims and slit boundaries from each face.
  brep-face-list-shrink-faces:
    lifecycle: single
    description: Shrinks all the underlying surfaces in this Brep.              Sometimes the surfaces extend far beyond the trimming boundaries of the Brep Face.              This function will remove those portions of the surfaces that are not used.
  brep-face-list-split-bipolar-faces:
    lifecycle: single
    description: Splits surfaces with two singularities, like spheres, so the results             have at most one singularity.
  brep-face-list-split-closed-faces:
    lifecycle: single
    description: Splits closed surfaces so they are not closed.
  brep-face-list-split-face-at-tangents:
    lifecycle: single
    description: Splits the face of a Brep at tangent locations.
  brep-face-list-split-faces-at-tangents:
    lifecycle: single
    description: Splits all of the faces of a Brep at tangent locations.
  brep-face-list-split-kinky-face:
    lifecycle: single
    description: Splits a single face into G1 pieces.
  brep-face-list-split-kinky-faces:
    lifecycle: single
    description: Splits any faces with creases into G1 pieces.
  brep-face-list-standardize-face-surface:
    lifecycle: single
    description: Standardizes the relationship between a BrepFace and the 3d surface it             uses.  When done, the face will be the only face that references its 3d             surface, and the orientations of the face and 3d surface will be the same.
  brep-face-list-standardize-face-surfaces:
    lifecycle: single
    description: Standardize all faces in the brep.
  brep-face-pull-points-to-face:
    lifecycle: single
    description: Pulls one or more points to a brep face.
  brep-face-rebuild-edges:
    lifecycle: single
    description: Rebuild the edges used by a face so they lie on the surface.
  brep-face-refit-trim:
    lifecycle: single
    description: The RefitTrim command replaces a trimmed surface edge with an untrimmed edge.
  brep-face-remove-holes:
    lifecycle: single
    description: Remove all inner loops, or holes, from a Brep face.
  brep-face-set-domain:
    lifecycle: single
    description: Sets the surface domain of this face.
  brep-face-set-mesh:
    lifecycle: single
    description: Sets a reference to a specified type of mesh for this brep face.
  brep-face-set-pack-id:
    lifecycle: single
    description: Used by SubD functions that create breps to transmit the subd face SubDFace.PackId value              to the brep face or faces generated from the subd face.             Unless you are an expert and doing something very carefully and very fancy, to not call this function.
  brep-face-shrink-face:
    lifecycle: single
    description: Shrinks the underlying untrimmed surface of this Brep face close to trimming boundaries.             Shrinking a surface is like extending smoothly, only backwards. knot of full multiplicity             are added where you want the surface to be cut off. Then the remaining control points are             thrown away.
  brep-face-shrink-surface-to-edge:
    lifecycle: single
    description: Shrinks the underlying untrimmed surface of this Brep face right to the trimming boundaries.             Note, shrinking the trimmed surface can sometimes cause problems later since having             the edges so close to the trimming boundaries can cause commands that use the surface             edges as input to fail.
  brep-face-split:
    lifecycle: single
    description: Split this face using 3D trimming curves.
  brep-face-trim-aware-iso-curve:
    lifecycle: single
    description: Similar to IsoCurve function, except this function pays attention to trims on faces              and may return multiple curves.
  brep-face-trim-aware-iso-intervals:
    lifecycle: single
    description: Gets intervals where the iso curve exists on a BrepFace (trimmed surface)
  brep-face-underlying-surface:
    lifecycle: single
    description: Gets the untrimmed surface that is the base of this face.
  brep-find-coincident-brep-components:
    lifecycle: single
    description: Find the indices of all brep faces, edges and vertices that are within tolerance of a test-point.
  brep-flip:
    lifecycle: single
    description: Reverses entire brep orientation of all faces.
  brep-get-area:
    lifecycle: single
    description: Compute the Area of the Brep. If you want proper Area data with moments              and error information, use the AreaMassProperties class.
  brep-get-connected-components:
    lifecycle: single
    description: If this Brep has two or more connected components, then duplicates of the connected components are returned.
  brep-get-point-inside:
    lifecycle: single
    description: Finds a point inside of a solid Brep.
  brep-get-regions:
    lifecycle: single
    description: Gets an array containing all regions in this brep.
  brep-get-tangent-connected-components:
    lifecycle: single
    description: If this Brep has two or more components connected by tangent edges,             then duplicates of the connected components are returned.
  brep-get-volume:
    lifecycle: single
    description: Compute the Volume of the Brep. If you want proper Volume data with moments              and error information, use the VolumeMassProperties class.
  brep-get-wireframe:
    lifecycle: single
    description: Constructs all the Wireframe curves for this Brep.
  brep-inset-faces:
    lifecycle: single
    description: Individually insets faces of a brep by offsetting the faces outer edges inward and inner edges out then splitting the face with the offset curves.
  brep-is-box:
    lifecycle: single
    description: Verifies a Brep is in the form of a solid box.
  brep-is-duplicate:
    lifecycle: single
    description: See if this and other are same brep geometry.
  brep-is-oriented-manifold:
    lifecycle: single
    description: Test a Brep to see if it is an oriented manifold.             Non manifold Breps have at least one edge that is shared among three or more faces.
  brep-is-point-inside:
    lifecycle: single
    description: Determines if point is inside a Brep.  This question only makes sense when             the brep is a closed and manifold.  This function does not check for             closed or manifold, so result is not valid in those cases.  Intersects             a line through point with brep, finds the intersection point Q closest             to point, and looks at face normal at Q.  If the point Q is on an edge             or the intersection is not transverse at Q, then another line is used.
  brep-is-valid-geometry:
    lifecycle: single
    description: Expert user function that tests the brep to see if its geometry information is valid.             The value of brep.IsValidTopology() must be true before brep.IsValidGeometry() can be             safely called.
  brep-is-valid-tolerances-and-flags:
    lifecycle: single
    description: Expert user function that tests the brep to see if its tolerances and             flags are valid.  The values of brep.IsValidTopology() and             brep.IsValidGeometry() must be true before brep.IsValidTolerancesAndFlags()             can be safely called.
  brep-is-valid-topology:
    lifecycle: single
    description: Tests the brep to see if its topology information is valid.
  brep-join:
    lifecycle: single
    description: If any edges of this brep overlap edges of otherBrep, merge a copy of otherBrep into this             brep joining all edges that overlap within tolerance.
  brep-join-breps:
    lifecycle: single
    description: Joins the breps in the input array at any overlapping edges to form             as few as possible resulting breps. There may be more than one brep in the result array.
  brep-join-edges:
    lifecycle: single
    description: Joins two naked edges, or edges that are coincident or close together.
  brep-join-naked-edges:
    lifecycle: single
    description: Joins naked edge pairs within the same brep that overlap within tolerance.
  brep-loop-list-add:
    lifecycle: single
    description: Create a new empty boundary loop. The new loop will not be part of a face and             will not include any trim curves.
  brep-loop-list-add-outer-loop:
    lifecycle: single
    description: Create a new outer boundary loop that runs along the sides             of the face's surface.  All the necessary trims, edges,             and vertices are created and added to the brep.
  brep-loop-list-add-planar-face-loop:
    lifecycle: single
    description: Add a planar trimming loop to a planar face
  brep-loop-list-get-enumerator:
    lifecycle: single
    description: Gets an enumerator that visits all edges.
  brep-loop-to2d-curve:
    lifecycle: single
    description: Create a 2d curve that traces the entire loop
  brep-loop-to3d-curve:
    lifecycle: single
    description: Create a 3D curve that approximates the loop geometry.
  brep-make-valid-for-v2:
    lifecycle: single
    description: No support is available for this function.             Expert user function that converts all geometry in Brep to NURB form.
  brep-merge-breps:
    lifecycle: single
    description: Combines two or more breps into one. A merge is like a boolean union that keeps the inside pieces. This             function creates non-manifold Breps which in general are unusual in Rhino. You may want to consider using             JoinBreps or CreateBooleanUnion functions instead.
  brep-merge-coplanar-faces:
    lifecycle: single
    description: Merges adjacent coplanar faces into single faces.
  brep-merge-surfaces:
    lifecycle: single
    description: Merges two surfaces into one surface at untrimmed edges.
  brep-object-duplicate-brep-geometry:
    lifecycle: single
    description: Constructs a new deep copy of the Brep geometry.
  brep-push-pull-extend:
    lifecycle: single
    description: If the brep.Faces[faceIndex] is planar, and all the adjacent faces are planar, this function transforms brep.Faces[faceIndex]             with the transform parameter and recomputes the adjacent faces. See the PushPull commands extend mode.
  brep-rebuild-trims-for-v2:
    lifecycle: single
    description: No support is available for this function.             Expert user function used by MakeValidForV2 to convert trim             curves from one surface to its NURBS form. After calling this function,             you need to change the surface of the face to a NurbsSurface.
  brep-region-boundary-brep:
    lifecycle: single
    description: Gets the boundary of a region as a brep object. If the region is finite,             the boundary will be a closed  manifold brep. The boundary may have more than one             connected component.
  brep-region-get-face-sides:
    lifecycle: single
    description: Gets an array of  entities delimiting this region.
  brep-remove-fins:
    lifecycle: single
    description: Recursively removes any Brep face with a naked edge. This function is only useful for non-manifold Breps.
  brep-remove-holes:
    lifecycle: single
    description: Remove all inner loops, or holes, in a Brep.
  brep-repair:
    lifecycle: single
    description: Fills in missing or fixes incorrect component information from a Brep.              Useful when reading Brep information from other file formats that do not              provide as complete of a Brep definition as required by Rhino.
  brep-set-tolerances-boxes-and-flags:
    lifecycle: single
    description: Set tolerances and flags in a Brep.
  brep-set-trim-iso-flags:
    lifecycle: single
    description: "This function can be used to set the BrepTrim::m_iso             flag. It is intended to be used when creating a Brep from             a definition that does not include compatible parameter space             type information."
  brep-set-vertices:
    lifecycle: single
    description: This function can be used to compute vertex information for a             b-rep when everything but the Vertices array is properly filled in.             It is intended to be used when creating a Brep from a              definition that does not include explicit vertex information.
  brep-split:
    lifecycle: single
    description: Splits a Brep into pieces using a Brep as a cutter.
  brep-split-disjoint-pieces:
    lifecycle: single
    description: Separates, or splits, a disjoint Brep into separate Breps.
  brep-standardize:
    lifecycle: single
    description: Standardizes all trims, edges, and faces in the brep.             After standardizing, there may be unused curves and surfaces in the             brep.  Call Brep.Compact to remove these unused curves and surfaces.
  brep-surface-list-get-enumerator:
    lifecycle: single
    description: Gets an enumerator that visits all surfaces.
  brep-transform-component:
    lifecycle: single
    description: Transform an array of Brep components, bend neighbors to match, and leave the rest fixed.
  brep-trim:
    lifecycle: single
    description: Trims a brep with an oriented cutter. The parts of the brep that lie inside             (opposite the normal) of the cutter are retained while the parts to the             outside (in the direction of the normal) are discarded.  If the Cutter is             closed, then a connected component of the Brep that does not intersect the             cutter is kept if and only if it is contained in the inside of cutter.             That is the region bounded by cutter opposite from the normal of cutter,             If cutter is not closed all these components are kept.
  brep-trim-get-tolerances:
    lifecycle: single
    description: The values in tolerance[] record the accuracy of the parameter space              trimming curves.
  brep-trim-get-trim-parameter:
    lifecycle: single
    description: Get corresponding trim parameter at given edge parameter.
  brep-trim-is-reversed:
    lifecycle: single
    description: Get orientation of trim with respect to it's corresponding edge.
  brep-trim-list-add:
    lifecycle: single
    description: Add a new trim that will be part of an inner, outer, or slit loop             to the brep.
  brep-trim-list-add-curve-on-face:
    lifecycle: single
    description: Add a new curve on face to the brep
  brep-trim-list-add-singular-trim:
    lifecycle: single
    description: Add a new singular trim to the brep.
  brep-trim-list-get-enumerator:
    lifecycle: single
    description: Gets an enumerator that visits all edges.
