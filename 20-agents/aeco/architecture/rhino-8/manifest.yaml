    lifecycle: single
    description: Find sthe Tait-Byran angles, also loosely called Euler angles, for this quaternion.
  quaternion-invert:
    lifecycle: single
    description: Modifies this quaternion to become             (a/L2, -b/L2, -c/L2, -d/L2),where L2 = length squared = (a*a + b*b + c*c + d*d).This is the multiplicative inverse, i.e.,             (a,b,c,d)*(a/L2, -b/L2, -c/L2, -d/L2) = (1,0,0,0).
  quaternion-lerp:
    lifecycle: single
    description: Interpolates between two quaternions, using linear interpolation.
  quaternion-matrix-form:
    lifecycle: single
    description: Returns 4x4 real valued matrix form of the quaternion             a  b  c  d             -b  a -d  c             -c  d  a -b             -d -c  b  a             which has the same arithmetic properties as the quaternion.
  quaternion-product:
    lifecycle: single
    description: The quaternion product of p and q.  This is the same value as p*q.
  quaternion-rotate:
    lifecycle: single
    description: Rotates a 3d vector. This operation is also called conjugation,             because the result is the same as             (q.Conjugate()*(0,x,y,x)*q/q.LengthSquared).Vector.
  quaternion-rotate-towards:
    lifecycle: single
    description: Returns the quaternion obtained by rotating a towards b, limiting the rotation by MaxRadians.
  quaternion-rotation:
    lifecycle: single
    description: Returns the unit quaternion             cos(angle/2), sin(angle/2)*x, sin(angle/2)*y, sin(angle/2)*z             where (x,y,z) is the unit vector parallel to axis.  This is the             unit quaternion that represents the rotation of angle about axis.
  quaternion-set:
    lifecycle: single
    description: Sets all coefficients of the quaternion.
  quaternion-set-rotation:
    lifecycle: single
    description: Sets the quaternion to cos(angle/2), sin(angle/2)*x, sin(angle/2)*y, sin(angle/2)*z             where (x,y,z) is the unit vector parallel to axis.  This is the unit quaternion             that represents the rotation of angle about axis.
  quaternion-slerp:
    lifecycle: single
    description: Interpolates between two quaternions, using spherical linear interpolation.
  quaternion-to-string:
    lifecycle: single
    description: Returns a string representation of this Quaternion.
  quaternion-unitize:
    lifecycle: single
    description: Scales the quaternion's coordinates so that a*a + b*b + c*c + d*d = 1.
