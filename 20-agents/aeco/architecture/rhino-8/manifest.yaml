  transform-decompose-affine:
    lifecycle: single
    description: Decomposes an affine transformation.             A transformation is affine if it is valid and its last row is [0, 0, 0, 1].             An affine transformation can be broken into a linear transformation and a translation.             Note, a perspective transformation is not affine.
  transform-decompose-rigid:
    lifecycle: single
    description: Decomposes a rigid transformation. The transformation must be affine.
  transform-decompose-similarity:
    lifecycle: single
    description: Decomposes a similarity transformation. The transformation must be affine.             A similarity transformation can be broken into a sequence of a dilation, translation, rotation, and a reflection.
  transform-decompose-symmetric:
    lifecycle: single
    description: A Symmetric linear transformation can be decomposed A = Q * Diag * Q ^ T, where Diag is a diagonal             transformation. Diag[i][i] is an eigenvalue of A and the i-th column of Q is a corresponding             unit length eigenvector. Note, this transformation must be Linear and Symmetric.
