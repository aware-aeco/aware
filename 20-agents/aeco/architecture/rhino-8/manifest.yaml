  cylinder-circle-at:
    lifecycle: single
    description: Compute the circle at the given elevation parameter.
  cylinder-epsilon-equals:
    lifecycle: single
    description: Check that all values in other are within epsilon of the values in this
  cylinder-line-at:
    lifecycle: single
    description: Compute the line at the given angle parameter. This line will be degenerate if the cylinder is infinite.
  cylinder-to-brep:
    lifecycle: single
    description: Constructs a Brep representation of this Cylinder.              This is synonymous with calling NurbsSurface.CreateFromCylinder().
  cylinder-to-nurbs-surface:
    lifecycle: single
    description: Constructs a Nurbs surface representation of this cylinder.              This is synonymous with calling NurbsSurface.CreateFromCylinder().
  cylinder-to-rev-surface:
    lifecycle: single
    description: Constructs a RevSurface representation of this Cylinder.              This is synonymous with calling RevSurface.CreateFromCylinder().
  cylinder-transform:
    lifecycle: single
    description: Transforms this cylinder. Note that non-similarity preserving transformations              cannot be applied to a cylinder.
  dash-style-equals:
    lifecycle: single
    description: Determines whether the specified  is equal to the current .
  dash-style-get-hash-code:
    lifecycle: single
    description: Serves as a hash function for a  object.
  dash-style-parse:
    lifecycle: single
    description: Attempts to parse the specified  into a dash style.  This can be one of the             system styles (solid, dash, dot, dashdot, dashdotdot), or a series of numbers separated by commas              specifying the solid and gap parts (see ).
  dash-style-to-string:
    lifecycle: single
    description: Returns a  that represents the current .
