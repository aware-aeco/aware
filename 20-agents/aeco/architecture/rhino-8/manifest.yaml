    description: Get a channel for reading. A post effect will use this to get channel data as input to             its process. Output will be written to new channel(s). \see GetChannelForWrite()             This method returns the current state of the channel at this stage in the pipeline.             If the first post effect calls this, it will get the actual frame buffer channel.             Subsequent post effects will get the data left behind by the previous post effect.             A post effect calls GetChannelForRead() to get its input and GetChannelForWrite()             to get the object to which it will write its output. Even when the same channel id             is specified, these are separate, unconnected objects.
  post-effect-pipeline-get-channel-for-write:
    lifecycle: single
    description: "Get a channel for writing. A post effect will use this to get channel(s) to write the output of its             processing to. Input will usually come from existing channels, although a post effect is free to read             its own output channels if needed. See GetChannelForRead()             You are allowed to create one new channel with the same identifier as an existing channel,             in which case IChannel::Commit() will replace the existing channel with the new one in the pipeline."
