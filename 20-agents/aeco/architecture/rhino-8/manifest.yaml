  custom-render-mesh-provider-will-build-custom-meshes:
    lifecycle: single
    description: Determines if custom render meshes will be built for a particular object.
  custom-render-mesh-provider2-bounding-box:
    lifecycle: single
    description: CustomRenderMeshProvider2.BoundingBox
  custom-render-mesh-provider2-build-custom-meshes:
    lifecycle: single
    description: CustomRenderMeshProvider2.BuildCustomMeshes
