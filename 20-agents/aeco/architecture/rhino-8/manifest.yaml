  viewport-info-change-to-parallel-projection:
    lifecycle: single
    description: Use this function to change projections of valid viewports             from parallel to perspective.  It will make common additional             adjustments to the frustum and camera location so the resulting             views are similar.  The camera direction and target point are             not be changed.             If the current projection is parallel and symmetricFrustum,             FrustumIsLeftRightSymmetric() and FrustumIsTopBottomSymmetric()             are all equal, then no changes are made and true is returned.
  viewport-info-change-to-parallel-reflected-projection:
    lifecycle: single
    description: When a viewport is set to Parallel Reflected projection, the geometry on the ceiling is shown as if it is mirrored to the floor below.
  viewport-info-change-to-perspective-projection:
    lifecycle: single
    description: Use this function to change projections of valid viewports             from parallel to perspective.  It will make common additional             adjustments to the frustum and camera location so the resulting             views are similar.  The camera direction and target point are             not changed.             If the current projection is perspective and symmetricFrustum,             IsFrustumIsLeftRightSymmetric, and IsFrustumIsTopBottomSymmetric             are all equal, then no changes are made and true is returned.
