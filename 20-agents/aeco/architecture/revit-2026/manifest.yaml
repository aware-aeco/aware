agent:        revit-2026
version:      2026.0.0
display-name: Autodesk Revit 2026 (raw)
description: |
  Auto-generated agent from Autodesk Revit 2026's `RevitAPI.dll` via
  `aware build agent --from-dlls`. Pure API-surface reflection — method
  names, parameter types, and lifecycle markers only. No vendor XML doc
  summaries (queued for v0.6.2).

  Covers 24 skills × 6,445 commands spanning the full Revit API: DB
  (architecture / structure / MEP / electrical / mechanical / plumbing),
  application services, events, extensible storage, fabrication, IFC,
  point clouds, visual, macros, and more. Raw — no curation of which
  APIs matter for which workflows.

  Autodesk's Revit API documentation is at
  https://help.autodesk.com/view/RVT/. The proprietary `.dll` is not
  redistributed; only its public reflection metadata is.

  Marked `stateful: false` because raw reflection has no way to identify
  the session-start method; whoever curates this into a workflow-ready
  agent will flip one command's lifecycle to `start` and the rest to
  `single` / `child` / `stop` as appropriate.

stateful: false

vendor:   autodesk
license:  Apache-2.0
homepage: https://github.com/aware-aeco/aware/tree/main/20-agents/aeco/architecture/revit-2026
keywords: [aeco, architecture, bim, revit, autodesk, generated, raw, 2026]

