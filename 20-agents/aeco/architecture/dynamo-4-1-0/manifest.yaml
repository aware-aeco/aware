agent:        dynamo-4-1-0
version:      0.1.0
sdk-target:   4.1.0.4845
display-name: Dynamo Core 4.1.0 (raw)
description: |
  Auto-generated agent from `DynamoVisualProgramming.Core@4.1.0.4845`
  on NuGet via `aware build agent --from-nuget`. Reflects the
  vendor-curated reference assemblies of Autodesk's Dynamo —
  the open-source visual programming environment for Revit + AutoCAD
  + Civil 3D + standalone Dynamo Sandbox.

  Dynamo is how the BIM-power-user crowd writes parametric design
  scripts WITHOUT touching the Revit .NET API directly: drag-drop
  nodes onto a canvas, wire them together, run. Used heavily for
  computational design, automation of repetitive Revit operations,
  data-driven modeling, and parametric authoring across the Autodesk
  AECO stack.

  Covers 75 classes × 1,713 commands across the Dynamo Core surface:
  Workspace + WorkspaceModel (the canvas), Engine + DynamoModel (the
  scheduler), NodeModel + ConnectorModel (the graph), Library + Type
  + ZeroTouchLibrary (node introspection), Migration (graph upgrades
  across Dynamo versions), Logging, and the math + utility nodes
  Dynamo ships with.

  Dynamo is **Apache-2.0** — fully open source. AWARE-generated text
  here is also Apache-2.0. The library is not redistributed; users
  install `DynamoVisualProgramming.Core` themselves via NuGet (or
  run Dynamo standalone / inside Revit).

  Companion to `dynamo-4-1-1`. Sibling Autodesk agents in AWARE:
  `autocad-2025/26`, `revit-2025/26`.

  Marked `stateful: false` — typical Dynamo programmatic usage is
  open-workspace → execute → query → save. Curators of long-running
  reactive workflows could later flag `DynamoModel.Start()` /
  `EngineController` setup as `lifecycle: start`.

stateful: false

