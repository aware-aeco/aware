  replicator-build-partial-replication-instructions:
    lifecycle: single
    description: "Calculate partial replication instruciton based on replication guide level.              For example, for foo(xs<1><2><3>, ys<1><1><2>, zs<1><1><3>), the guides              are:                                level |  0  |  1  |  2  |                  ------+-----+-----+-----+                    xs  |  1  |  2  |  3  |                  ------+-----+-----+-----+                    ys  |  1  |  1  |  2  |                  ------+-----+-----+-----+                    zs  |  1  |  1  |  3  |                           This function goes through each level and calculate replication instructions.                            replication instructions on level 0:                  Zip replication on (0, 1, 2) (i.e., zip on xs, ys, zs)                           replication instructions on level 1:                  Zip replication on (1, 2)    (i.e., zip on ys, zs)                  Cartesian replication on 0   (i.e., on xs)                           replication instructions on level 2:                  Cartesian replication on 1   (i.e., on ys)                  Zip replication on (0, 2)    (i.e., zip on xs, zs)"
  replicator-build-reductions:
    lifecycle: single
    description: Replicator.BuildReductions
  replicator-build-replication-combinations:
    lifecycle: single
    description: Build all possible replications based on the rank of parameters and             the provided replicatoin guide.
  replicator-compute-all-reduced-params:
    lifecycle: single
    description: "For each parameter, if there is a replication instruction for it, and             if it is an array, expand parameter list based on the types of elements             in that array. For example, for parameters                              {p1, p2, ..., pk, ..., pn} where pk is an array                                   {a1:int, a2:string, a3:double, ...}                           and there is a Cartesian replication on pk, the parameter list will be             expanded to                              {p1, p2, ..., a1, ..., pn}                 {p1, p2, ..., a2, ..., pn}                 {p1, p2, ..., a3, ..., pn}                 ..."
  replicator-estimate-reduced-params:
    lifecycle: single
    description: Compute the effects of the replication guides on the formal parameter lists             The results of this loose data, and will not be correct on jagged arrays of hetrogenius types
  replicator-get-max-reduction-depth:
    lifecycle: single
    description: Returns the maximum depth to which an element can be reduced             This will include cases where only partial reduction can be performed on jagged arrays
  replicator-reduction-to-instructions:
    lifecycle: single
    description: Convert reduction to instruction. Using zip-first strategy.                          For example,                 0 2 4   > Zip on 1,2                 0 1 3   > Zip on 1,2                 0 0 2   > Cartesian on 2                 0 0 1   > Cartesian on 2
