  gh-rhino-script-interface-close-all-documents:
    lifecycle: single
    description: Close all Grasshopper documents.
  gh-rhino-script-interface-close-document:
    lifecycle: single
    description: Close the currently active Grasshopper document. If there is not active document, nothing will happen.
  gh-rhino-script-interface-disable-banner:
    lifecycle: single
    description: Disables the display of the Grasshopper banner during Component loading. The banner is typically only shown once during a Grasshopper session, namely when the Editor is first loaded.
  gh-rhino-script-interface-disable-solver:
    lifecycle: single
    description: Disables the Grasshopper Solver. If the Solver is disabled, expired components and parameter will not be recomputed, though any existing solution will remain intact.
  gh-rhino-script-interface-enable-banner:
    lifecycle: single
    description: Enables the display of the Grasshopper banner during Component loading. The banner is typically only shown once during a Grasshopper session, namely when the Editor is first loaded.
  gh-rhino-script-interface-enable-solver:
    lifecycle: single
    description: Enables the Grasshopper Solver. If the Solver is enabled, expired components and parameter will be recomputed.
  gh-rhino-script-interface-hide-editor:
    lifecycle: single
    description: Hide the main Grasshopper Editor. If the editor hasn't been loaded or if the Editor is already hidden, nothing will happen.
  gh-rhino-script-interface-is-editor-loaded:
    lifecycle: single
    description: Returns the loaded state of the Grasshopper Main window.
  gh-rhino-script-interface-is-editor-visible:
    lifecycle: single
    description: Returns the visible state of the Grasshopper Main window.
  gh-rhino-script-interface-is-solver-enabled:
    lifecycle: single
    description: Returns the state of the Grasshopper Solver.
  gh-rhino-script-interface-load-editor:
    lifecycle: single
    description: Load the main Grasshopper Editor. If the editor has already been loaded nothing will happen.
  gh-rhino-script-interface-loaded-plugin-guids:
    lifecycle: single
    description: Gets an array of the IDs of all loaded plugins.
  gh-rhino-script-interface-loaded-plugin-names:
    lifecycle: single
    description: Gets an array of the names and versions (if known) of all loaded plugins.
  gh-rhino-script-interface-open-document:
    lifecycle: single
    description: Open a Grasshopper document. The editor will be loaded if necessary, but it will not be automatically shown.
  gh-rhino-script-interface-run-as-command:
