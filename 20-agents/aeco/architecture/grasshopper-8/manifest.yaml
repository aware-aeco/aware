  gh-rhino-script-interface-run-in-command-context:
    lifecycle: single
    description: ""
  gh-rhino-script-interface-run-solver:
    lifecycle: single
    description: Runs the solver once, even if the global solver lock is on.
  gh-rhino-script-interface-save-document:
