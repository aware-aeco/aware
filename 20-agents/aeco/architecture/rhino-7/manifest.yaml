display-name: Rhino 7 (raw)
description: |
  Auto-generated agent from `RhinoCommon@7.38.24338.17001` on NuGet
  via `aware build agent --from-nuget`. Reflects the vendor-curated
  reference assemblies (the public-API contract — `ref/` DLLs) of
  McNeel's RhinoCommon SDK for Rhino 7.

  Companion agent: `grasshopper-7` (the Grasshopper computational
  modeling SDK). Install both for the full Rhino + Grasshopper
  workflow surface.

