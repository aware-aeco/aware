  sketchup-model-observer-abstract-on-erase-all:
    lifecycle: single
    description: "The #onEraseAll method is invoked when everything in a model is erased."
  sketchup-model-observer-abstract-on-explode:
    lifecycle: single
    description: The method is invoked whenever a component anywhere in this model is exploded. This is an easier way to watch explode events vs. attaching an InstanceObserver to every instance in the model.
  sketchup-model-observer-abstract-on-pid-changed:
