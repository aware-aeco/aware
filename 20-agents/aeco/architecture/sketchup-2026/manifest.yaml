    description: "The #get_validation_proc method returns the command's validation proc."
  u-i-command-large-icon:
    lifecycle: single
    description: The large_icon= method is used to identify the icon file for the command's large icon. large icons should be 32x32 pixel images for best display quality.
  u-i-command-menu-text:
