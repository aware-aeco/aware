  u-i-notification-on-accept-title:
    lifecycle: single
    description: Returns the accept's button title.
  u-i-notification-on-dismiss:
    lifecycle: single
    description: Shows a button in the notification with the given title and callback block. Both arguments are required. This callback is only called if you press the Dismiss button, not when the time runs out and the notification automatically disappears.
  u-i-notification-on-dismiss-title:
    lifecycle: single
    description: Returns the dismiss's button title.
  u-i-notification-show:
    lifecycle: single
    description: Shows the notification. If not interacted with, the notification will disappear without calling any callbacks.
  u-i-open-u-r-l:
    lifecycle: single
    description: The openURL method is used to open the default browser to a URL.
  u-i-openpanel:
    lifecycle: single
    description: The openpanel method is used to display the Open dialog box. The path that is returned can then be used inside code to open a text or image file. See the standard Ruby class File for examples of reading and writing from disk.
  u-i-play-sound:
    lifecycle: single
    description: The play_sound method is used to play a sound file. Valid sound files include .wav and .mp3 files on the Mac and .wav files on the PC.
  u-i-preferences-pages:
    lifecycle: single
    description: The preferences_pages method is used to returns the names of all the preferences pages. These include windows like Templates.
  u-i-refresh-inspectors:
    lifecycle: single
    description: Tells SketchUp to refresh all inspectors such as the Component Browser and the Outliner. This is useful when you need to manually force a refresh after you've made a change to the document via Ruby. Generally, SketchUp will keep these in sync for you, but occasionally it does not, such as when model.start_operation has disabled UI updates.
  u-i-refresh-toolbars:
    lifecycle: single
    description: "Tells SketchUp to refresh all floating toolbars. This is useful when you need to manually force a refresh after you've made a change to the document via Ruby. Generally, SketchUp will keep these in sync for you, but occasionally it does not, such as when Sketchup::Model#start_operation has disabled UI updates. This only affects macOS, on Windows the toolbars are always refreshing."
  u-i-savepanel:
    lifecycle: single
    description: The savepanel method is used to display the Save dialog box. The path that is returned can then be used inside code to save out a text or image file. See the standard Ruby class File for examples of reading and writing from disk.
  u-i-scale-factor:
    lifecycle: single
    description: "SU2017M0 will automatically scale up line width and text size, but will not scale up the points provided to Sketchup::View#draw2d."
  u-i-select-directory:
    lifecycle: single
    description: The select_directory method is used to display the OS dialog for selecting one or several directories from the file system.
  u-i-set-clipboard-data:
    lifecycle: single
    description: Copies plain text to the clipboard.
  u-i-set-cursor:
    lifecycle: single
    description: The set_cursor method is used to change the cursor to a new cursor with a given cursor id. See UI.create_cursor and the Tool class for details on creating your own tools with arbitrary cursors.
  u-i-set-toolbar-visible:
    lifecycle: single
    description: The set_toolbar_visible method is used to set whether a given toolbar is visible.  Note that the toolbars and their names are different on the Mac vs. PC, so be careful and be sure to test when using this method in a cross-platform script.
  u-i-show-extension-manager:
    lifecycle: single
    description: The show_extension_manager method is used to display the Extension Manager dialog.
  u-i-show-inspector:
    lifecycle: single
    description: The show_inspector method is used to display the inspector with the given name. You can get the list of valid inspectors with UI.inspector_names.
  u-i-show-model-info:
    lifecycle: single
    description: The show_model_info method is used to display the model info dialog for a specific page. You can get the list of valid page names with model_info_pages.
  u-i-show-preferences:
    lifecycle: single
    description: The show_preferences method is used to display a SketchUp preferences dialog. You can get the list of valid dialogs with preferences_pages.
  u-i-start-timer:
    lifecycle: single
    description: The start_timer method is used to start a timer. This is an effective method to create a repeating snippet of code for arbitrary animation.
  u-i-stop-timer:
    lifecycle: single
    description: The stop_timer method is used to stop a timer based on its id.
  u-i-toolbar:
    lifecycle: single
    description: The toolbar method is used to get a Ruby toolbar by name. If the toolbar doesn't exist a new one will be created.
  u-i-toolbar-add-item:
    lifecycle: single
    description: The add_item method is used to add an item to the toolbar.
  u-i-toolbar-add-separator:
    lifecycle: single
    description: The add_separator method is used to add a line separator to the toolbar.
  u-i-toolbar-count:
    lifecycle: single
    description: "The #count method is inherited from the Enumerable mix-in module."
  u-i-toolbar-each:
    lifecycle: single
    description: "The #each method is used to iterate through all of the commands attached to a toolbar."
  u-i-toolbar-get-last-state:
    lifecycle: single
    description: The get_last_state method is used to determine if the toolbar was hidden or visible in the previous session of SketchUp.
  u-i-toolbar-hide:
    lifecycle: single
    description: The hide method is used to hide the toolbar on the user interface.
  u-i-toolbar-length:
    lifecycle: single
    description: "The #length method returns the number of items in the toolbar."
  u-i-toolbar-name:
    lifecycle: single
    description: The name method returns the name of the toolbar.
  u-i-toolbar-names:
    lifecycle: single
    description: The toolbar_names method is used to return the name of all the available native toolbars (this differs between PC and Mac). These toolbar names do not include Ruby toolbars.
  u-i-toolbar-new:
    lifecycle: single
    description: The new method creates a new Toolbar object.
  u-i-toolbar-restore:
    lifecycle: single
    description: The restore method is used to reposition the toolbar to its previous location and show if not hidden.
  u-i-toolbar-show:
    lifecycle: single
    description: The show method is used to display the toolbar in the user interface.
  u-i-toolbar-size:
    lifecycle: single
    description: "The #size method is an alias of #length."
  u-i-toolbar-visible:
    lifecycle: single
    description: The visible? method is used to find out if a toolbar is currently visible.
  u-i-web-dialog-deprecated-add-action-callback:
    lifecycle: single
    description: The add_action_callback method establishes a Ruby callback method that your web dialog can call to perform some function.
  u-i-web-dialog-deprecated-allow-actions-from-host:
    lifecycle: single
    description: By default, actions are only allowed on the host where the webdialog is displayed. The allow_actions_from_host method is used to selectively allow actions to take place on a host remote from the host where the webdialog exists. If the webdialog is local, no remote host is allowed unless you use this method.
  u-i-web-dialog-deprecated-bring-to-front:
    lifecycle: single
    description: The bring_to_front method is used to bring the webdialog to the front of all the windows on the desktop. See show_modal for how to ensure that your WedDialogs are on top.
  u-i-web-dialog-deprecated-close:
    lifecycle: single
    description: The close method is used to close the webdialog.
  u-i-web-dialog-deprecated-execute-script:
    lifecycle: single
    description: The execute_script method is used to execute a JavaScript string on the web dialog.
  u-i-web-dialog-deprecated-get-default-dialog-color:
    lifecycle: single
    description: The get_default_dialog_color method is used to get the default dialog color for the web dialog.
  u-i-web-dialog-deprecated-get-element-value:
    lifecycle: single
    description: The get_element_value method is used to get a value, with a given element_id, from the web dialog's DOM.
  u-i-web-dialog-deprecated-initialize:
    lifecycle: single
    description: Since SU2017 the position and size of the dialog is DPI aware - it will scale to the DPI of the monitor automatically. Specify units as they would be on a traditional low-DPI monitor.
  u-i-web-dialog-deprecated-max-height:
    lifecycle: single
    description: As of SU2017 this will automatically scale the height by the same factor as UI.scale_factor.
  u-i-web-dialog-deprecated-max-width:
    lifecycle: single
    description: As of SU2017 this will automatically scale the width by the same factor as UI.scale_factor.
  u-i-web-dialog-deprecated-min-height:
    lifecycle: single
    description: As of SU2017 this will automatically scale the height by the same factor as UI.scale_factor.
  u-i-web-dialog-deprecated-min-width:
    lifecycle: single
    description: As of SU2017 this will automatically scale the width by the same factor as UI.scale_factor.
  u-i-web-dialog-deprecated-navigation-buttons-enabled:
    lifecycle: single
    description: The navigation_buttons_enabled? method is used to get whether the home, next, and back buttons are visible at the top of the WebDialog on the mac. This method has no use on the PC, as these buttons are never displayed.
  u-i-web-dialog-deprecated-post-url:
    lifecycle: single
    description: The post_url method is used to send the data to a url using the HTTP POST method.
  u-i-web-dialog-deprecated-screen-scale-factor:
    lifecycle: single
    description: The screen_scale_factor method returns the ratio of screen pixels to logical window units (called 'points' on Mac) for the screen this WebDialog is currently in. On a retina screen Mac, this ratio will be greater than 1.0. On Windows this always return 1.0.
  u-i-web-dialog-deprecated-set-background-color:
    lifecycle: single
    description: The set_background_color method is used to set the background color for the webdialog.
  u-i-web-dialog-deprecated-set-file:
    lifecycle: single
    description: "The #set_file method is used to identify a local HTML file to display in the webdialog."
  u-i-web-dialog-deprecated-set-full-security:
    lifecycle: single
    description: The set_full_security method is used to place the WebDialog into a higher security mode where remote URLs and plugins (such as Flash) are not allowed inside the browser. This defaults to false when a new WebDialog is created.
  u-i-web-dialog-deprecated-set-html:
    lifecycle: single
    description: The set_html method is used to load a webdialog with a string of provided HTML.
  u-i-web-dialog-deprecated-set-on-close:
    lifecycle: single
    description: "#close method should not be called from the #set_on_close callback. That would make it trigger itself recursively."
  u-i-web-dialog-deprecated-set-position:
    lifecycle: single
    description: As of SU2017 this will automatically scale the x and y by the same factor as UI.scale_factor.
  u-i-web-dialog-deprecated-set-size:
    lifecycle: single
    description: As of SU2017 this will automatically scale the width and height by the same factor as UI.scale_factor.
  u-i-web-dialog-deprecated-set-url:
    lifecycle: single
    description: The set_url method is used to load a webdialog with the content at a specific URL. This method allows you to load web sites in a webdialog.
  u-i-web-dialog-deprecated-show:
    lifecycle: single
    description: The show method is used to display a non-modal dialog box.
  u-i-web-dialog-deprecated-show-modal:
    lifecycle: single
    description: The show_modal method is used to display a modal dialog box. In SketchUp 6 and 7, this behaves differently on Mac vs. PC. On the PC, it shows a truly modal dialog, meaning so long as the WebDialog is visible, no input can be performed elsewhere inside SketchUp. On the Mac, “modal” WebDialogs do not behave this way, but instead are “always on top” of other windows.
  u-i-web-dialog-deprecated-visible:
    lifecycle: single
    description: The visible? method is used to tell if the webdialog is currently shown.
  u-i-web-dialog-deprecated-write-image:
    lifecycle: single
    description: The write_image method is used to grab a portion of the web dialog screen and save the image to the given file path.
