    description: "The #onSaveModel method is invoked after a model has been saved to disk."
  sketchup-model-observer-abstract-on-transaction-abort:
    lifecycle: single
    description: "The #onTransactionAbort method is invoked when a transaction is aborted."
  sketchup-model-observer-abstract-on-transaction-commit:
    lifecycle: single
    description: "The #onTransactionCommit method is invoked when a transaction is completed."
  sketchup-model-observer-abstract-on-transaction-empty:
    lifecycle: single
