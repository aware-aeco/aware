    description: "If you draw outside the model bounds you need to implement #getExtents which return a bounding box large enough to include the points you draw. Otherwise your drawing will be clipped."
  sketchup-tool-abstract-enable-v-c-b:
    lifecycle: single
    description: "The #enableVCB? method is used to tell SketchUp whether to allow the user to enter text into the VCB (value control box, aka the “measurements” panel). If you do not implement this method, then the vcb is disabled by default."
  sketchup-tool-abstract-get-extents:
    lifecycle: single
    description: In order to accurately draw things, SketchUp needs to know the extents of what it is drawing. If the tool is doing its own drawing, it may need to implement this method to tell SketchUp the extents of what it will be drawing. If you don't implement this method, you may find that part of what the tool is drawing gets clipped to the extents of the rest of the model.
  sketchup-tool-abstract-get-instructor-content-directory:
    lifecycle: single
    description: Prior to SketchUp 2014 this method would assume the path was relative to the SketchUp resource folder. From 2014 and onwards you can specify the absolute path to an HTML file or the absolute path to a directory containing an index.html file.
  sketchup-tool-abstract-get-menu:
    lifecycle: single
    description: In SketchUp 2015 the flags, x, y and view parameters were added. They are needed if you need to pick the entities under the mouse position. The new parameters are optional, but if you need to use one you must include them all.
  sketchup-tool-abstract-on-cancel:
    lifecycle: single
    description: "When something is undone #onCancel is called before the undo is actually executed. If you need to do something with the model after an undo use ModelObserver#onTransactionUndo."
  sketchup-tool-abstract-on-key-down:
    lifecycle: single
    description: "The #onKeyDown method is called by SketchUp when the user presses a key on the keyboard. If you want to get input from the VCB, you should implement onUserText rather than this method."
  sketchup-tool-abstract-on-key-up:
    lifecycle: single
    description: "The #onKeyUp method is called by SketchUp when the user releases a key on the keyboard."
  sketchup-tool-abstract-on-l-button-double-click:
    lifecycle: single
    description: "The #onLButtonDoubleClick is called by SketchUp when the user double clicks with the left mouse button."
  sketchup-tool-abstract-on-l-button-down:
    lifecycle: single
    description: "The #onLButtonDown method is called by SketchUp when the left mouse button is pressed. Most tools will implement this method."
  sketchup-tool-abstract-on-l-button-up:
    lifecycle: single
    description: "The #onLButtonUp method is called by SketchUp when the left mouse button is released."
  sketchup-tool-abstract-on-m-button-double-click:
    lifecycle: single
    description: Though this method has been documented in the Ruby API for many years, it has never worked properly. We are leaving this documentation in place for now in the hopes of fixing the implementation, but you won't have any luck trying to use it in SU7 and earlier.
  sketchup-tool-abstract-on-m-button-down:
    lifecycle: single
    description: "The #onMButtonDown method is called by SketchUp when the middle mouse button (on a three button mouse) is down."
  sketchup-tool-abstract-on-m-button-up:
    lifecycle: single
    description: "The #onMButtonUp method is called by SketchUp when the middle mouse button (on a three button mouse) is released."
  sketchup-tool-abstract-on-mouse-enter:
    lifecycle: single
    description: "The #onMouseEnter method is called by SketchUp when the mouse enters the viewport."
  sketchup-tool-abstract-on-mouse-leave:
    lifecycle: single
    description: "The #onMouseLeave method is called by SketchUp when the mouse leaves the viewport."
  sketchup-tool-abstract-on-mouse-move:
    lifecycle: single
    description: "The #onMouseMove method is called by SketchUp whenever the mouse is moved. You will often want to implement this method."
  sketchup-tool-abstract-on-mouse-wheel:
    lifecycle: single
    description: "The #onMouseWheel method is called by SketchUp when the mouse scroll wheel is used."
  sketchup-tool-abstract-on-r-button-double-click:
    lifecycle: single
    description: "The #onRButtonDoubleClick is called by SketchUp when the user double clicks with the right mouse button."
  sketchup-tool-abstract-on-r-button-down:
    lifecycle: single
    description: "The #onRButtonDown method is called by SketchUp when the user presses the right mouse button. Implement this method, along with the tool.getMenu method, when you want your tool to do something other than display the default context menu when the right mouse button is clicked."
  sketchup-tool-abstract-on-r-button-up:
    lifecycle: single
    description: "The #onRButtonUp method is called by SketchUp when the user releases the right mouse button."
  sketchup-tool-abstract-on-return:
    lifecycle: single
    description: "The #onReturn method is called by SketchUp when the user hit the Return key to complete an operation in the tool. This method will rarely need to be implemented."
  sketchup-tool-abstract-on-set-cursor:
    lifecycle: single
    description: "The #onSetCursor method is called by SketchUp when the tool wants to set the cursor."
  sketchup-tool-abstract-on-user-text:
    lifecycle: single
    description: "The #onUserText method is called by SketchUp when the user has typed text into the VCB and hit return."
  sketchup-tool-abstract-resume:
    lifecycle: single
    description: "The #resume method is called by SketchUp when the tool becomes active again after being suspended."
  sketchup-tool-abstract-suspend:
    lifecycle: single
    description: "The #suspend method is called by SketchUp when the tool temporarily becomes inactive because another tool has been activated. This typically happens when a viewing tool is activated, such as when orbit is active due to the middle mouse button."
  sketchup-tools-active-tool:
    lifecycle: single
    description: "The #active_tool method is used to obtain the active Ruby tool."
  sketchup-tools-active-tool-id:
    lifecycle: single
    description: The active_tool_id method is used to retrieve the active tool's id.
  sketchup-tools-active-tool-name:
    lifecycle: single
    description: The active_tool_name method is used to retrieve the active tool's name.
  sketchup-tools-add-observer:
    lifecycle: single
    description: The add_observer method is used to add an observer to the current object.
  sketchup-tools-model:
    lifecycle: single
    description: The model method is used to get the model associated with this tools object.
  sketchup-tools-observer-abstract-on-active-tool-changed:
    lifecycle: single
    description: In SketchUp 6 and SketchUp 7.0, tool names on the Mac have some of their first characters truncated. For instance, on Windows, a tool is “CameraOrbit”. On the Mac, is comes across as “raOrbit”.  Therefore, use the tool_id to keep track of which tool you need to watch for, or use logic that corrects for the error. There is an example method of one way to do this shown below. (This example is not a comprehensive list of the tool names.)
  sketchup-tools-observer-abstract-on-tool-state-changed:
    lifecycle: single
    description: In SketchUp 6 and SketchUp 7, tool names on the Mac have their first few characters truncated. For instance, on Windows, a tool is “CameraOrbit”. On the Mac, is comes across as “raOrbit”.  Therefore, use the tool_id to keep track of which tool you need to watch for, or use logic that corrects for the error. This bug was fixed in SketchUp 8.0.
  sketchup-tools-pop-tool:
    lifecycle: single
    description: The pop_tool method is used to pop the last pushed tool on the tool stack.
  sketchup-tools-push-tool:
    lifecycle: single
    description: The push_tool method is used to push (aka activate) a user-defined tool. See the Tool interface for details on creating your own SketchUp tool.
  sketchup-tools-remove-observer:
    lifecycle: single
    description: The remove_observer method is used to remove an observer from the current object.
  sketchup-u-v-helper-get-back-u-v-q:
