    description: "The #axes method returns the drawing axes for the model."
  sketchup-model-behavior:
    lifecycle: single
    description: The behavior method retrieves the behavior of the model.
  sketchup-model-bounds:
    lifecycle: single
    description: "The #bounds method is used to retrieve the Geom::BoundingBox bounding the contents of a Sketchup::Model."
  sketchup-model-classifications:
    lifecycle: single
    description: "The #classifications method is used to retrieve the Classifications object for this model."
  sketchup-model-close:
    lifecycle: single
    description: As of SketchUp 2024.0 this method will ensure the next model window gets focus if there is one. Before that `Sketchup.active_model` might return `nil` after calling this method even though more models where open.
  sketchup-model-close-active:
