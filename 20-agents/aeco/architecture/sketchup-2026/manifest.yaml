    description: "This is the preferred method to update the viewport. Use this before trying to use #refresh."
  sketchup-view-last-refresh-time:
    lifecycle: single
    description: The last_refresh_time method is used to retrieve the time for the last full view refresh.
  sketchup-view-line-stipple:
    lifecycle: single
    description: "The line_stipple= method is used to set the line pattern to use for drawing. The stipple pattern is given as a string. Valid strings are:"
  sketchup-view-line-width:
    lifecycle: single
    description: As of SU2017 this will automatically scale the line width by the same factor as UI.scale_factor.
  sketchup-view-load-texture:
    lifecycle: single
    description: "Avoid loading and releasing textures within the Tool#draw event as that is not efficient."
  sketchup-view-lock-inference:
    lifecycle: single
    description: "The #lock_inference method is used to lock or unlock an inference."
  sketchup-view-model:
    lifecycle: single
    description: The model method is used to retrieve the model for the current view.
  sketchup-view-observer-abstract-on-scale-factor-change:
    lifecycle: single
    description: "The #onScaleFactorChange method is called whenever the view DPI of the view changes. This can be the SketchUp window being moved to another monitor with a different DPI or the user changing the DPI settings of the monitor."
  sketchup-view-observer-abstract-on-view-changed:
    lifecycle: single
    description: "The #onViewChanged method is called whenever the view is altered, such as when the user uses the Pan, Orbit, or Zoom tools."
  sketchup-view-pick-helper:
    lifecycle: single
    description: "The #pick_helper method is used to retrieve a pick helper for the view."
  sketchup-view-pickray:
    lifecycle: single
    description: "The #pickray method is used to retrieve a ray passing through a given screen position in the viewing direction."
  sketchup-view-pixels-to-model:
    lifecycle: single
    description: As of SU2017 this will automatically scale the pixel-size by the same factor as UI.scale_factor.
  sketchup-view-refresh:
    lifecycle: single
    description: "This method might impact performance and if used incorrectly cause instability or crashes. Don't use this unless you have verified that you cannot use #invalidate instead."
  sketchup-view-release-texture:
    lifecycle: single
    description: "Releases a texture loaded via #load_texture, freeing up it's memory. It's good practice to do so whenever there is no longer any need for the resource."
  sketchup-view-remove-observer:
    lifecycle: single
    description: The remove_observer method is used to remove an observer from the current object.
  sketchup-view-screen-coords:
    lifecycle: single
    description: Prior to SketchUp 2025.0 this method returned the points as physical screen coordinates. As of SketchUp 2025.0 the points are returned in logical screen coordinates.
  sketchup-view-set-color-from-line:
    lifecycle: single
    description: Set the drawing color for the view based on the direction of a line that you want to draw. These colors will match the axes colors in the SketchUp model (typically blue for straight up and down, etc.)
  sketchup-view-show-frame:
    lifecycle: single
    description: The show_frame method is used to show a frame of an Animation object in the current view.
  sketchup-view-text-bounds:
    lifecycle: single
    description: Under Windows the font name must be less than 32 characters - due to system limitations.
  sketchup-view-tooltip:
    lifecycle: single
    description: Set a tooltip to display in the view. This is useful for displaying tooltips in a tool that you write in Ruby.
  sketchup-view-vpheight:
    lifecycle: single
    description: Prior to SketchUp 2025.0 this method returned the size as physical screen coordinates. As of SketchUp 2025.0 the size are returned in logical screen coordinates.
  sketchup-view-vpwidth:
    lifecycle: single
    description: Prior to SketchUp 2025.0 this method returned the size as physical screen coordinates. As of SketchUp 2025.0 the size are returned in logical screen coordinates.
  sketchup-view-write-image:
    lifecycle: single
    description: "The #write_image method is used to write the current view to an image file."
  sketchup-view-zoom:
    lifecycle: single
    description: The zoom method is used to zoom in or out by some zoom factor.
  sketchup-view-zoom-extents:
    lifecycle: single
    description: The zoom_extents method is used to zoom to the extents about the entire model, as if the user has selected the zoom extents command from the menu.
  sketchup-write-default:
    lifecycle: single
    description: Be aware that the method is not capable of handling Length objects. You can convert the value to a Float before writing and convert back to Length when reading the value. Don't store the value as a String as this rounds the value and formats it in a way that can't be read if the system setting for decimal separator changes.
  string-to-l:
    lifecycle: single
    description: The to_l method is used to convert a string to a length. The returned length is expressed in the Model units.
  top-level-namespace-add-separator-to-menu:
    lifecycle: single
    description: 
  top-level-namespace-file-loaded:
    lifecycle: single
    description: "Use in combination with #file_loaded to create load guards for code you don't want to reload. Especially useful to protect your UI setup from creating duplicate menus and toolbars."
  top-level-namespace-inputbox:
    lifecycle: single
    description: This is a wrapper for UI.inputbox.  You call it exactly the same as UI.inputbox.  UI.inputbox will raise an exception if it can't convert the string entered for one of the values into the right type. This method will trap the exception and display an error dialog and then prompt for the values again.
  top-level-namespace-require-all:
    lifecycle: single
    description: This adds the path given to $LOAD_PATH which can affect other extensions.
  top-level-namespace-show-ruby-panel:
    lifecycle: single
    description: Use SKETCHUP_CONSOLE.show instead.
  u-i-add-context-menu-handler:
    lifecycle: single
    description: The add_context_menu_handler method is used to register a block of code with SketchUp that will be called when a context menu is to be displayed. The context menu handler can then display the context menu with the items that you have added.
  u-i-beep:
    lifecycle: single
    description: The beep method plays a system beep sound.
  u-i-command-extension:
    lifecycle: single
    description: This is an advanced feature that extension developers normally won't have to deal with. It's purpose is to address scenarios when SketchUp isn't able to automatically infer which extension the command belongs to. These scenarios are for example an extension using a library to add its commands or command manager extensions.
  u-i-command-get-validation-proc:
