agent:        sketchup-2026
version:      0.1.0
sdk-target:   2026.0.0
display-name: SketchUp 2026 Ruby API (raw)
description: |
  Auto-generated agent from the SketchUp 2026 Ruby API YARD docs
  (https://github.com/SketchUp/ruby-api-docs, tag `SU2026.0`) via
  `aware build agent --from-yard`. The SketchUp Ruby API is what
  SketchUp extensions are written against — it loads inside SketchUp's
  embedded Ruby interpreter and exposes the model, view, UI, layout,
  geometry, and observer APIs.

  Covers 156 classes × 1,713 methods reflected from the public YARD
  HTML. The docs themselves are published openly at
  https://ruby.sketchup.com/ and mirrored to GitHub by Trimble's
  SketchUp Extensibility team.

  Marked `stateful: false` because raw reflection has no way to
  identify the session-start method; curators flip lifecycles when
  refining (SketchUp Ruby code typically runs inside an active
  SketchUp session, so a future curator might tag the model-open path
  as `start`).

  C SDK (file-format reading/writing outside SketchUp) is *not* in
  this agent — different surface, different license. The C SDK is
  intentionally not shipped in the registry; see CLI README.

stateful: false

