  sketchup-model-commit-operation:
    lifecycle: single
    description: The commit_operation method commits an operation for undo.
  sketchup-model-definitions:
    lifecycle: single
    description: "The #definitions method retrieves a definition list containing all of the component definitions in the model."
  sketchup-model-description:
    lifecycle: single
    description: "The #description= method sets the description of the model."
  sketchup-model-drawing-element-visible:
