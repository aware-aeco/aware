  sketchup-component-definition-refresh-thumbnail:
    lifecycle: single
    description: The refresh_thumbnail method is used to force SketchUp to regenerate the thumbnail image that appears in the component browser. This is useful if you've used the API to change the geometry of your component and would like the thumbnail to match.
  sketchup-component-definition-remove-classification:
    lifecycle: single
    description: The remove_classification method is used to remove a given classification from the component.
  sketchup-component-definition-remove-observer:
    lifecycle: single
    description: The remove_observer method is used to remove an observer from the current object.
  sketchup-component-definition-save-as:
    lifecycle: single
    description: "The #save_as method is used to save your definition as a SketchUp file at the specified file destination."
  sketchup-component-definition-save-copy:
    lifecycle: single
    description: "The #save_copy method is used to save your definition as a SketchUp file without changing the file path it is already associated with."
  sketchup-component-definition-save-thumbnail:
    lifecycle: single
    description: Saves a component thumbnail image. The image format is specified by the file extension of filePath. Supported image formats are bmp, jpg, png, tif, pct, and gif.
  sketchup-component-definition-set-classification-value:
    lifecycle: single
    description: The set_classification_value method is used to set the value of a classification attribute given a key path.
  sketchup-component-definition-thumbnail-camera:
    lifecycle: single
    description: "The #thumbnail_camera= method is used to set the camera for the thumbnail associated with the component definition."
  sketchup-component-instance-add-observer:
    lifecycle: single
    description: The add_observer method is used to add an observer to the current object.
  sketchup-component-instance-definition:
    lifecycle: single
    description: The definition= method is used to set the component definition for this component.
  sketchup-component-instance-equals:
    lifecycle: single
    description: The equals? method is used to determine if a component instance is geometrically equivalent to another instance.
  sketchup-component-instance-explode:
    lifecycle: single
    description: The explode method is used to explode the component instance into separate entities.
  sketchup-component-instance-glued-to:
    lifecycle: single
    description: "The #glued_to= method glues this instance to a drawing element. When moving this other drawing elment with the Move tool, the glued instance moves with it."
  sketchup-component-instance-guid:
    lifecycle: single
    description: The guid method is used to get the base 64 encoded unique id for this SketchUp object.
  sketchup-component-instance-intersect:
    lifecycle: single
    description: This method is not available in SketchUp Make.
  sketchup-component-instance-locked:
    lifecycle: single
    description: The locked? method is used to determine if a component instance is locked.
  sketchup-component-instance-make-unique:
    lifecycle: single
    description: "The #make_unique method is used to create a component definition for this instance that is not used by any other instances. If the component is already unique in the model, nothing happens."
  sketchup-component-instance-manifold:
    lifecycle: single
    description: The manifold? method is used to determine if an instance is manifold.
  sketchup-component-instance-move:
    lifecycle: single
    description: "Despite the name being similar to #transform!, this method closer corresponds to #transformation=."
  sketchup-component-instance-name:
    lifecycle: single
    description: The name method is used to set the name of this instance.
  sketchup-component-instance-outer-shell:
    lifecycle: single
    description: The outer_shell method is used to compute the outer shell of the two instances representing manifold solid volumes (this || arg). If the specified objects (this and arg) do not represent manifold volumes, this method fails.
  sketchup-component-instance-remove-observer:
    lifecycle: single
    description: The remove_observer method is used to remove an observer from the current object.
  sketchup-component-instance-show-differences:
    lifecycle: single
    description: The show_differences method is used to determine if a component instance is geometrically equivalent to another instance and in addition move the non- matching and matching geometry to new layers.
  sketchup-component-instance-split:
    lifecycle: single
    description: This method is not available in SketchUp Make.
  sketchup-component-instance-subtract:
    lifecycle: single
    description: This method is not available in SketchUp Make.
  sketchup-component-instance-transform:
    lifecycle: single
    description: "Apply a Geom::Transformation to a component instance."
  sketchup-component-instance-transformation:
    lifecycle: single
    description: "As of SketchUp 2026, this will raise an error if the Geom::Transformation is not invertible. Prior to 2026 this would silently set the transformation possibly causing rendering or editing problems."
  sketchup-component-instance-trim:
    lifecycle: single
    description: Trimming object instance2 using instance1 results in a new trimmed version of instance2. If the trim is successful the original instance2 is erased and a newly trimmed version is created. This new version, derived from the trimming operation, will possess a new GUID and will be returned.
  sketchup-component-instance-union:
    lifecycle: single
    description: This method is not available in SketchUp Make.
  sketchup-component-instance-volume:
    lifecycle: single
    description: The volume method is used to compute the volume of this instance if and only if this instance is manifold.
  sketchup-console-clear:
    lifecycle: single
    description: Clears the contents of SketchUp's Ruby Console.
  sketchup-console-hide:
    lifecycle: single
    description: Hides the SketchUp Ruby Console.
  sketchup-console-show:
    lifecycle: single
    description: Displays the SketchUp Ruby Console.
  sketchup-console-visible:
    lifecycle: single
    description: Returns the visibility state of the SketchUp Ruby Console.
  sketchup-construction-line-direction:
    lifecycle: single
    description: The direction= method is used to set the direction of the construction line to a 3D vector.
  sketchup-construction-line-end:
    lifecycle: single
    description: The end= method is used to set the end point of the construction line. This method will make the length finite at the end.
  sketchup-construction-line-position:
    lifecycle: single
    description: The position= method is used to set a 3D point that the construction passes through
  sketchup-construction-line-reverse:
    lifecycle: single
    description: The reverse! method is used to reverse the direction of the construction line.
  sketchup-construction-line-start:
    lifecycle: single
    description: The start= method is used to set the start point of a construction line making the line's length finite at the start.
  sketchup-construction-line-stipple:
    lifecycle: single
    description: "The #stipple= method is used to set the stipple pattern used to display the construction line. The stipple pattern is given as a string."
  sketchup-construction-point-position:
    lifecycle: single
    description: The position method is used to retrieve a Point3d used to create a construction point.
  sketchup-create-texture-writer:
    lifecycle: single
    description: The create_texture_writer method is used to create a TextureWriter object.
  sketchup-curve-count-edges:
    lifecycle: single
    description: The count_edges method is used to retrieve the number of Edge objects that make up the Curve.
  sketchup-curve-each-edge:
    lifecycle: single
    description: The each_edge method is used to iterate through all of the Edge objects in the curve.
  sketchup-curve-edges:
    lifecycle: single
    description: The edges method is used to retrieve an array of Edge objects that make up the Curve.
  sketchup-curve-first-edge:
    lifecycle: single
    description: The first_edge method is used to retrieve the first edge of the curve.
  sketchup-curve-is-polygon:
    lifecycle: single
    description: Returns True if this edge was originally created by the polygon tool, otherwise false.
  sketchup-curve-last-edge:
    lifecycle: single
    description: The last_edge method is used to retrieve the last edge of the curve.
  sketchup-curve-length:
    lifecycle: single
    description: The length method retrieves the length of the curve.
  sketchup-curve-move-vertices:
    lifecycle: single
    description: "The #move_vertices method moves the vertices in the curve to points."
  sketchup-curve-vertices:
    lifecycle: single
    description: The vertices method retrieves a collection of all vertices in a curve.
  sketchup-debug-mode:
    lifecycle: single
    description: The debug_mode? controls whether SketchUp will output warnings to the console when it detects incorrect usage of the API.
  sketchup-definition-list:
    lifecycle: single
    description: The [] method is used to retrieve a component definition from the list. You can give an integer index in the range 0 to length, a string which represents the GUID (a unique internal identifier), or a string that is the name of the definition.
  sketchup-definition-list-add:
    lifecycle: single
    description: The add method is used to add a new component definition to the definition list with the given name.
  sketchup-definition-list-add-observer:
    lifecycle: single
    description: The add_observer method is used to add an observer to the current object.
  sketchup-definition-list-count:
    lifecycle: single
    description: "Since SketchUp 2014 the count method is inherited from Ruby's Enumerable mix-in module. Prior to that the #count method is an alias for #length."
  sketchup-definition-list-each:
    lifecycle: single
    description: "Don't remove content from this collection while iterating over it with #each. This would change the size of the collection and cause elements to be skipped as the indices change. Instead copy the current collection to an array using to_a and then use each on the array, when removing content."
  sketchup-definition-list-import:
    lifecycle: single
    description: "The #import method is used to import a (non-SketchUp) 3d model file as a definition."
  sketchup-definition-list-length:
    lifecycle: single
    description: "The #length method is used to retrieve number of component definitions in the list."
  sketchup-definition-list-load:
    lifecycle: single
    description: "The #load method is used to load a component from a file."
  sketchup-definition-list-load-from-url:
    lifecycle: single
    description: "The #load_from_url method loads a component from a location specified by string url."
  sketchup-definition-list-purge-unused:
    lifecycle: single
    description: The purge_unused method is used to remove the unused component definitions.
  sketchup-definition-list-remove:
    lifecycle: single
    description: "The #remove method is used to remove a component definition from the definition list with the given component definition. This will remove all instances of the definition."
  sketchup-definition-list-remove-observer:
    lifecycle: single
    description: The remove_observer method is used to remove an observer from the current object.
  sketchup-definition-list-size:
    lifecycle: single
    description: "The #size method is an alias for #length."
  sketchup-definition-list-unique-name:
    lifecycle: single
    description: "The unique_name is used to generate a unique name for a definition based on a base_name string. For example, a base_name of “Joe” might return “Joe #2”"
  sketchup-definition-observer-abstract-on-component-instance-added:
    lifecycle: single
    description: "The #onComponentInstanceAdded method is called when a new component instance is added to a model."
  sketchup-definition-observer-abstract-on-component-instance-removed:
    lifecycle: single
    description: Due to the underlying way that the SketchUp Move Tool is implemented, this method is fired on a Move + Copy operation even though no ComponentInstance is apparently removed.
  sketchup-definitions-observer-abstract-on-component-added:
    lifecycle: single
    description: "The #onComponentAdded method is called whenever a definition is added to the definitions collection."
  sketchup-definitions-observer-abstract-on-component-properties-changed:
    lifecycle: single
    description: "The #onComponentPropertiesChanged method is called whenever a definition's name or description are changed."
  sketchup-definitions-observer-abstract-on-component-removed:
    lifecycle: single
    description: This methods fires twice for each Component/Group erased.
  sketchup-definitions-observer-abstract-on-component-type-changed:
    lifecycle: single
    description: "The #onComponentTypeChanged event is fired when a component is converted to a group or vice versa. (In the underlying implementation, Groups are just a special kind of definition that is allowed to only have a single instance.)"
  sketchup-dimension-add-observer:
    lifecycle: single
    description: "If the given observer responds to onTextChanged, it will be added as a Sketchup::DimensionObserver. If not, the base Entity#add_observer will be called."
  sketchup-dimension-arrow-type:
    lifecycle: single
    description: "The #arrow_type= method sets the arrow type of the dimension."
  sketchup-dimension-had-aligned-text:
    lifecycle: single
    description: The has_aligned_text= method accepts true or false indicating whether the dimension's text is aligned to the dimension or to the screen.
  sketchup-dimension-has-aligned-text:
    lifecycle: single
    description: The has_aligned_text method is used to determine whether the dimension's text is aligned to the dimension or to the screen.
  sketchup-dimension-linear-aligned-text-position:
    lifecycle: single
    description: "The #aligned_text_position= method is used to set the text position for dimensions with aligned text (i.e. has_aligned_text? returns true). Valid values are class constants:"
  sketchup-dimension-linear-end:
    lifecycle: single
    description: The end= method is used to set the end point of the dimension and/or the entity it is referencing.
  sketchup-dimension-linear-end-attached-to:
    lifecycle: single
    description: "The #end_attached_to= method will attach the ending point to the InstancePath and Geom::Point3d."
  sketchup-dimension-linear-offset-vector:
    lifecycle: single
    description: The offset_vector= method is used to set the parallel offset vector from the reference line to the dimension line measured from the 'start' reference point.
  sketchup-dimension-linear-start:
    lifecycle: single
    description: The start= method is used to set the start point of the dimension and/or the entity it is referencing.
  sketchup-dimension-linear-start-attached-to:
    lifecycle: single
    description: "The #start_attached_to= method will attach the starting point to the InstancePath and Geom::Point3d."
  sketchup-dimension-linear-text-position:
    lifecycle: single
    description: "The #text_position= method is used to set the position of the text along the dimension line. Valid values are class constants:"
  sketchup-dimension-observer-abstract-on-text-changed:
    lifecycle: single
    description: "The #onTextChanged method is invoked when your entity is erased."
  sketchup-dimension-plane:
    lifecycle: single
    description: The plane method is used to retrieve the plane of the dimension. Refer to the Geom module for information on how planes are represented.
  sketchup-dimension-radial-arc-curve:
    lifecycle: single
    description: The arc_curve= method is used to set the ArcCurve object to which this dimension is attached.
  sketchup-dimension-radial-leader-break-point:
    lifecycle: single
    description: "The #leader_break_point= method is used to set the break point on the leader where the dimension text is attached."
  sketchup-dimension-radial-leader-points:
    lifecycle: single
    description: The leader_points method returns the 3 significant points along the dimension line in world coordinates.
  sketchup-dimension-remove-observer:
    lifecycle: single
    description: The remove_observer method is used to remove a DimensionObserver from the dimension. Note that, if the given observer responds to 'onTextChanged', it will be removed as a DimensionObserver. If not, the base Entity.remove_observer will be called.
  sketchup-dimension-text:
    lifecycle: single
    description: The text= method is used to set an override on the dimension text.
  sketchup-display-name-from-action:
    lifecycle: single
    description: This method has been non-functional on Mac since SketchUp 8.
  sketchup-drawingelement-bounds:
    lifecycle: single
    description: "The #bounds method is used to retrieve the Geom::BoundingBox bounding a Sketchup::Drawingelement."
  sketchup-drawingelement-casts-shadows:
    lifecycle: single
    description: The casts_shadows? method is used to determine if the Drawingelement is casting shadows.
  sketchup-drawingelement-erase:
    lifecycle: single
    description: "When erasing multiple elements, it's faster to use Entities#erase_entities and erase in bulk than to iterate individual drawing elements calling #erase!."
  sketchup-drawingelement-hidden:
    lifecycle: single
    description: The hidden? method is used to determine if the element is hidden.
  sketchup-drawingelement-layer:
    lifecycle: single
    description: The layer= method is used to set the layer for the drawing element.
  sketchup-drawingelement-material:
    lifecycle: single
    description: The material= method is used to set the material for the drawing element.
  sketchup-drawingelement-receives-shadows:
    lifecycle: single
    description: The receive_shadows? method is used to determine if the Drawingelement is receiving shadows.
  sketchup-drawingelement-visible:
    lifecycle: single
    description: "The #visible? method checks if a Drawingelement object is not explicitly hidden (i.e. its hidden property is false). However, this method's return value alone does not guarantee that the element is visible in the model view. Its tag or parent elements can also be hidden. Some element types can also be hidden by rendering options (Styles)."
  sketchup-edge-all-connected:
    lifecycle: single
    description: The all_connected method retrieves all of the entities connected to an edge, including the edge itself.
  sketchup-edge-common-face:
    lifecycle: single
    description: The common_face method is used to identify a face that is common to two edges.
  sketchup-edge-curve:
    lifecycle: single
    description: The curve method is used to get the Curve object that this edge belongs to, if any. Note that if the edge is part of an arc instead of a random curve, then this method will return an ArcCurve object.
  sketchup-edge-end:
    lifecycle: single
    description: The end method is used to retrieve the Vertex object at the end of the edge.
  sketchup-edge-explode-curve:
    lifecycle: single
    description: The explode_curve method is used to explode the curve that the given edge is a part of.
  sketchup-edge-faces:
    lifecycle: single
    description: "The #faces method is used to retrieve all of the faces common to the edge."
  sketchup-edge-find-faces:
    lifecycle: single
    description: The find_faces method is used to create all of the Faces that can be created with this edge. For example, if you use the API to draw three edges that form a triangle, the face between them will not show up because you've only drawn the edges, but if you call find_faces on one of the edges, the triangle will be filled in.
  sketchup-edge-length:
    lifecycle: single
    description: "The #length method is used to retrieve the length of an edge in current units."
  sketchup-edge-line:
    lifecycle: single
    description: The line method is used to retrieve the line defined by the edge. Lines in SketchUp aren't visible entities but geometric constructs represented by an Array with a Point3d and a Vector3d. See the Geom module and the Array class for more information on lines.
  sketchup-edge-other-vertex:
    lifecycle: single
    description: The other_vertex method is used to find the opposite vertex given one vertex of the edge.
  sketchup-edge-reversed-in:
    lifecycle: single
    description: "The #reversed_in? method is used to determine if the edge is reversed in a face's bounding loop."
  sketchup-edge-smooth:
    lifecycle: single
    description: "The #smooth? method is used to retrieve the current smooth setting for an edge."
  sketchup-edge-soft:
    lifecycle: single
    description: "The #soft? method is used to retrieve the current soft setting for an edge."
  sketchup-edge-split:
    lifecycle: single
    description: "The #split method is used to split an edge into two or more distinct edges. If a Point3d is given, it must be a point that is on the Edge."
  sketchup-edge-start:
    lifecycle: single
    description: The start method is used to retrieve the Vertex object at the start of the edge.
  sketchup-edge-use-edge:
    lifecycle: single
    description: The edge method is used to retrieve the edge for the edge use.
  sketchup-edge-use-end-vertex-normal:
    lifecycle: single
    description: The end_vertex_normal method is used to retrieve the vertex normal for the end point of this edgeuse.
  sketchup-edge-use-face:
    lifecycle: single
    description: The face method is used to retrieve the face used by this edge use.
  sketchup-edge-use-loop:
    lifecycle: single
    description: The loop method is used to retrieve the loop for this edge use.
  sketchup-edge-use-next:
    lifecycle: single
    description: The next method is used to retrieve the next edge use in a loop.
  sketchup-edge-use-partners:
    lifecycle: single
    description: The partners method is used to retrieve all of the partner edge uses that uses the same edge.
  sketchup-edge-use-previous:
    lifecycle: single
    description: The previous method is used to retrieve the previous edge use in a loop.
  sketchup-edge-use-reversed:
    lifecycle: single
    description: The reversed? method is used to determine if the edge direction is opposite of the edge use direction. The edge use direction is the same as the loop it belongs to.
  sketchup-edge-use-start-vertex-normal:
    lifecycle: single
    description: The start_vertex_normal method is used to retrieve the vertex normal for the start point of this edgeuse.
  sketchup-edge-used-by:
    lifecycle: single
    description: The used_by? method is used to see if an edge is used by a given Face or Vertex.
  sketchup-edge-vertices:
    lifecycle: single
    description: The vertices method is used to retrieve the vertices on the edge.
  sketchup-entities:
    lifecycle: single
    description: "The #[] method is used to retrieve an entity by its index in an array of entities. The index is a number between 0 and entities.length - 1. In general, it is preferable to use the #each method to iterate though all of the entities in the collection as it will be much more efficient."
  sketchup-entities-active-section-plane:
    lifecycle: single
    description: The active_section_plane= method is used to set the active section plane in the Entities object.
  sketchup-entities-add-3d-text:
    lifecycle: single
    description: "The #add_3d_text method is used to create 3D text. It will be added as edges and faces drawn at the origin."
  sketchup-entities-add-arc:
    lifecycle: single
    description: The add_arc method is used to create an arc curve segment.
  sketchup-entities-add-circle:
    lifecycle: single
    description: The add_circle method is used to create a circle.
  sketchup-entities-add-cline:
    lifecycle: single
    description: "The #add_cline method is used to create a construction line. This can be finite or infinite."
  sketchup-entities-add-cpoint:
    lifecycle: single
    description: The add_cpoint method is used to create a construction point.
  sketchup-entities-add-curve:
    lifecycle: single
    description: The add_curve method is used to create a curve from a collection of edges.
  sketchup-entities-add-dimension-linear:
    lifecycle: single
    description: "The #add_dimension_linear method adds a linear dimension to the entities."
  sketchup-entities-add-dimension-radial:
    lifecycle: single
    description: The add_dimension_radial method adds a radial dimension (i.e arc/circle radius/diameter dimension) to the entities.
  sketchup-entities-add-edges:
    lifecycle: single
    description: "If the points form a closed loop, the first and last vertex will not merge. If you intend to create a face from the edges, use #add_face directly."
  sketchup-entities-add-face:
    lifecycle: single
    description: A special case exists for any face created on the ground plane, in which case the vertex order is ignored and the face is always facing down.
  sketchup-entities-add-faces-from-mesh:
    lifecycle: single
    description: "The #add_faces_from_mesh method is used to add Face entities to the collection of entities from a Geom::PolygonMesh."
  sketchup-entities-add-group:
    lifecycle: single
    description: Calling add_group with entities in its parameters has been known to crash SketchUp before version 8.0. It is preferable to create an empty group and then add things to its Entities collection.
  sketchup-entities-add-image:
    lifecycle: single
    description: The add_image method is used to add an image to the collection of entities.
  sketchup-entities-add-instance:
    lifecycle: single
    description: "The #add_instance method adds a group or component instance to the collection of entities using an existent definition."
  sketchup-entities-add-line:
    lifecycle: single
    description: The add_line method is used to add an edge to the collection of entities. This is not to be confused with the concept of a “line” from a geometric sense, which is an invisible object represented by an Array of a point and a vector. (See the Array class for more information on geometric lines in SketchUp.)
  sketchup-entities-add-ngon:
    lifecycle: single
    description: The add_ngon method is used to create a multi-sided polygon.
  sketchup-entities-add-observer:
    lifecycle: single
    description: The add_observer method is used to add an observer to the current object.
  sketchup-entities-add-section-plane:
    lifecycle: single
    description: Adds a section plane object to the entities.
  sketchup-entities-add-snap:
    lifecycle: single
    description: "The #add_snap method is used to create a new Snap."
  sketchup-entities-add-text:
    lifecycle: single
    description: "The #add_text method adds a note or label text entity to the entities."
  sketchup-entities-at:
    lifecycle: single
    description: "The #at method is an alias for #[]."
  sketchup-entities-build:
    lifecycle: single
    description: "While using #build it is important to not add or remove vertices by other means than the builder. Also don't modify the position of the vertices in the Sketchup::Entities collection. Doing so can break the vertex-cache that de-duplicates the vertices."
  sketchup-entities-builder-add-edge:
    lifecycle: single
    description: Does not split intersecting faces or edges.
  sketchup-entities-builder-add-edges:
    lifecycle: single
    description: Does not split intersecting faces or edges.
  sketchup-entities-builder-add-face:
    lifecycle: single
    description: Does not split intersecting faces or edges.
  sketchup-entities-builder-entities:
    lifecycle: single
    description: "The Sketchup::Entities collection the Sketchup::EntitiesBuilder will add the geometry to."
  sketchup-entities-builder-valid:
    lifecycle: single
    description: Indicates whether the builder object is valid and can be used.
  sketchup-entities-builder-vertex-at:
    lifecycle: single
    description: Finds an existing Vertex for the given position, otherwise returns nil.
  sketchup-entities-clear:
    lifecycle: single
    description: The clear! method is used to remove all entities from the collection of entities.
  sketchup-entities-count:
    lifecycle: single
    description: "Since SketchUp 2014 the count method is inherited from Ruby's Enumerable mix-in module. Prior to that the #count method is an alias for #length."
  sketchup-entities-each:
    lifecycle: single
    description: "Don't remove content from this collection while iterating over it with #each. This would change the size of the collection and cause elements to be skipped as the indices change. Instead copy the current collection to an array using to_a and then use each on the array, when removing content."
  sketchup-entities-erase-entities:
    lifecycle: single
    description: "It's faster to use this method and erase in bulk than to iterate individual drawing elements calling Drawingelement#erase!."
  sketchup-entities-fill-from-mesh:
    lifecycle: single
    description: "The #fill_from_mesh method is used to add faces and edges to the collection of entities from a Geom::PolygonMesh. It requires that the entities collection to be filled is empty. It has higher performance than #add_faces_from_mesh, but does less error checking as it builds the geometry."
  sketchup-entities-intersect-with:
    lifecycle: single
    description: "The #intersect_with method is used to intersect a Sketchup::Entities, Sketchup::Component, or Sketchup::Group object with a entities object."
  sketchup-entities-length:
    lifecycle: single
