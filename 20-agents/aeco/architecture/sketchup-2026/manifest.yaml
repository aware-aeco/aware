  u-i-command-proc:
    lifecycle: single
    description: "The #proc method returns the command's proc that is called when the command is invoked."
  u-i-command-set-validation-proc:
    lifecycle: single
    description: Avoid disabling an command as it often isn't obvious to the user why it is disabled. Prefer keeping the command enabled but show an error message if pressed when it cannot be used.
  u-i-command-small-icon:
    lifecycle: single
    description: The small_icon= method is used to identify the icon file for the command's small icon. Small icons should be 24x24 pixel images for best display quality.
  u-i-command-status-bar-text:
