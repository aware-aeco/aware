  sketchup-model-observer-abstract-on-transaction-redo:
    lifecycle: single
    description: "The #onTransactionRedo method is invoked when the user “redoes” a transaction (aka undo operation.) You can programmatically fire a redo by calling Sketchup.sendAction(“editRedo”)."
  sketchup-model-observer-abstract-on-transaction-start:
