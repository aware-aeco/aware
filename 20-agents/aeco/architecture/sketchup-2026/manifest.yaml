    description: "Returns the Sketchup::AttributeDictionary object that is specified by name.  If the model does not have an attribute dictionary that corresponds to name, returns either nil, or a creates an attribute dictionary.  If the optional second argument is true, and there is no attribute dictionary that corresponds to name, a new attribute dictionary is created."
  sketchup-model-axes:
