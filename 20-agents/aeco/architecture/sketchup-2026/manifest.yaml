  sketchup-model-add-note:
    lifecycle: single
    description: Add a text note to the Model.  The position of the note is given as relative window positions between 0 and 1.  For example, the following command would create a note that start 1/10 of the ways down the screen from the upper left corner of the window.
  sketchup-model-add-observer:
