  sketchup-u-v-helper-get-front-u-v-q:
    lifecycle: single
    description: To convert UVQ coordinates to UV, divide U and V by Q.
  sketchup-undo:
    lifecycle: single
    description: The undo method is used undo the last transaction on the undo stack.
  sketchup-vcb-label:
