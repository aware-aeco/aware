    lifecycle: single
    description: GH_CapsuleRenderEngine.GetPaletteStyle
  gh-capsule-render-engine-render-alpha-fill:
    lifecycle: single
    description: Render a standard transparancy background hatch.   This is only needed when the capsule background colour is not fully opaque.   This is usually the second stage in a capsule rendering, right after the Grips are drawn.
  gh-capsule-render-engine-render-background:
    lifecycle: single
    description: Render a default capsule background fill. This is usually the third stage in a capsule rendering.
  gh-capsule-render-engine-render-background-alternative:
    lifecycle: single
    description: Render a custom capsule background fill. This is usually the third stage in a capsule rendering.
  gh-capsule-render-engine-render-boundary-dots:
    lifecycle: single
    description: Render a collection of boundary dots along the top edge of the capsule.
  gh-capsule-render-engine-render-grips:
    lifecycle: single
    description: Render all the grips associates with the capsule.   Grips are not drawn if the zoom level is less than 50%.   This is usually the first stage in a Capsule rendering.
  gh-capsule-render-engine-render-grips-alternative:
    lifecycle: single
    description: Render all the grips associates with the capsule as semi-circles.   This is needed if the capsule background is not fully opaque.   Grips are not drawn if the zoom level is less than 50%.   This is usually the first stage in a Capsule rendering.
  gh-capsule-render-engine-render-highlight:
    lifecycle: single
    description: Render a highlight bar. This is highly zoom-dependant.   Highlight rendering is usually the fourth stage in a Capsule Rendering,   after the background but prior to the edges.
  gh-capsule-render-engine-render-icon:
    lifecycle: single
    description: Render an image icon centered into the box. If the content box has been defined the icon   will be centered there, otherwise the outline box will be used.
  gh-capsule-render-engine-render-input-grip:
    lifecycle: single
    description: Static (Shared in VB) method to render a default input grip.
  gh-capsule-render-engine-render-message:
    lifecycle: single
    description: Render a text message underneath the capsule.
  gh-capsule-render-engine-render-outlines:
    lifecycle: single
    description: Render default capsule outlines.   If the zoom factor is less than 50% the inner outline is not drawn.   This is usually the fifth stage in a Capsule rendering.
  gh-capsule-render-engine-render-output-grip:
    lifecycle: single
    description: Static (Shared in VB) method to render a default output grip.
  gh-capsule-render-engine-render-text:
    lifecycle: single
    description: Render the capsule text.   This is usually the sixth and final stage in a capsule rendering.
