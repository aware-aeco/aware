    lifecycle: single
    description: Insert a data item into the specified branch in the structure.   If the branch doesn't exist yet, it will be created.
  gh-structure1-longest-path-index:
    lifecycle: single
    description: Finds the path in this structure with the most dimensions.   In case of multiple equally long longest paths, the last one   will be returned.
  gh-structure1-merge-structure:
    lifecycle: single
    description: Merges two structures together. Data inside similar paths will be merged into single lists   and unique paths will be appended. The other structure will not be altered, so beware that data is   now shared among both structures.
  gh-structure1-path-exists:
    lifecycle: single
    description: Returns True if the specified path is already defined inside the structure.
  gh-structure1-path-index:
    lifecycle: single
    description: Find the indices that surround the given path domain. Indices may be out of bounds.
  gh-structure1-read:
    lifecycle: single
    description: Read the entire GH_Structure from an archive.   This method relies on the the serialization of the IGH_Goo items it contains.  Also, the IGH_Goo T generic must have a public constructor that takes no arguments.
  gh-structure1-remove-data:
    lifecycle: single
    description: Removes the first occurence of a data instance in the tree.
  gh-structure1-remove-path:
    lifecycle: single
    description: Removes a path and all associated data from the structure.   If the path doesn't exist, nothing will happen.
  gh-structure1-replace-path:
    lifecycle: single
    description: Replace an existing path with a different one.   If the operation is successfull, then the 'find' path   will be deleted. If the 'replace' path is already defined,   the items in 'find' will be appended to the existing path.
  gh-structure1-reverse:
    lifecycle: single
    description: Reverse the order of items in all branches.
  gh-structure1-shallow-duplicate:
    lifecycle: single
    description: Create a structure with a similar topology to this one with pointers to the same data items.
  gh-structure1-shortest-path-index:
    lifecycle: single
    description: Finds the path in this structure with the least dimensions.   In case of multiple equally long longest paths, the first one   will be returned.
  gh-structure1-simplify:
    lifecycle: single
    description: Simplify the data structure by collapsing path indices shared by all branches.
  gh-structure1-to-string:
    lifecycle: single
    description: GH_Structure`1.ToString
  gh-structure1-trim-excess:
    lifecycle: single
    description: Trims the excess allocated memory in all branches.
  gh-structure1-write:
    lifecycle: single
    description: Write the entire GH_Structure to an archive.   This method relies on the the serialization of the IGH_Goo items it contains.
