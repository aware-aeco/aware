description: |
  Auto-generated agent from `Grasshopper@7.38.24338.17001` on NuGet
  via `aware build agent --from-nuget`. Reflects the vendor-curated
  reference assemblies (the public-API contract — `ref/` DLLs) of
  McNeel's Grasshopper SDK for Rhino 7 — the visual programming
  language for parametric / algorithmic / generative design.

  Companion agent: `rhino-7` (RhinoCommon SDK). Install both for the
  full Rhino + Grasshopper workflow surface — Grasshopper rides on
  RhinoCommon at runtime.

  Marked `stateful: false` because raw reflection has no way to
  identify the session-start method; curators flip lifecycles when
  refining.

