display-name: Autodesk Construction Cloud — Account Admin (raw)
description: |
  Auto-generated agent from Autodesk Platform Services'
  Account Admin OpenAPI spec via `aware build agent --from-openapi`.
  Source: `Autodesk-Platform-Services/aps-sdk-openapi` on GitHub.

  ACC Account Admin is the project-management + user-management +
  company-directory API surface of Autodesk Construction Cloud. 30
  endpoints across project create / archive / restore, user assign /
  remove / role-change, member + partner companies, and external-
  system sync.

  AECO use cases: onboard a new project from an HR/ERP system,
  automate user provisioning across ACC + Tekla + Slack on hire,
  audit who has access to what across a portfolio of projects, sync
  company directory to a billing tool.

  Auth via `aware connect autodesk`. Requires admin-level scopes
  (account:read, account:write).

  Marked `stateful: false` — every endpoint is request/response.

