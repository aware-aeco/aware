agent:        acc-issues
version:      0.1.0
sdk-target:   1.0
display-name: Autodesk Construction Cloud — Issues (raw)
description: |
  Auto-generated agent from Autodesk Platform Services'
  Issues OpenAPI spec via `aware build agent --from-openapi`.
  Source: `Autodesk-Platform-Services/aps-sdk-openapi` on GitHub
  (vendor-published, the canonical APS SDK spec).

  ACC Issues is the issue-tracking API surface inside Autodesk
  Construction Cloud — covers RFIs, observations, punch-list
  items, design issues, safety reports, commissioning. 14
  endpoints across issue creation, lookup, attachments, history,
  and the issue-type taxonomy.

  AECO use cases: auto-create a BCF-flavored issue when Tekla
  detects a clash; export Procore RFIs into ACC; close-loop
  punch list from a Trimble Connect viewpoint; aggregate weekly
  issue rollup for site PMs.

  Auth via `aware connect autodesk` (3-legged OAuth — most ACC
  endpoints need a user-context token, not a 2-legged app token).

  Marked `stateful: false` — every endpoint is request/response.

stateful: false

