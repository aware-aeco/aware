agent:        aps-data-management
version:      0.1.0
sdk-target:   1.0
display-name: Autodesk APS — Data Management (raw)
description: |
  Auto-generated agent from Autodesk Platform Services'
  Data Management OpenAPI spec via `aware build agent --from-openapi`.
  Source: `Autodesk-Platform-Services/aps-sdk-openapi` on GitHub.

  Data Management is the unified file/folder/version API across all
  Autodesk cloud storage: BIM 360 Docs, ACC Docs, Fusion Team, OSS
  (Object Storage Service). 41 endpoints covering hub / project /
  folder navigation, file CRUD, version history, item locking,
  search.

  Companion to `acc-issues` + `acc-account-admin`. This is the
  layer where AECO files actually live — upload a Revit model,
  fetch the latest version of a drawing, attach a PDF to a folder,
  create a new project folder structure.

  AECO use cases: pipeline that uploads exported Tekla drawings to
  the right ACC Docs folder daily, audit that finds outdated
  versions of an IFC across folders, automated weekly export of
  punch-list photos to a Slack channel.

  Auth via `aware connect autodesk`. Both 2-legged (server-to-server)
  and 3-legged (user-context) flows supported by different endpoints.

  Marked `stateful: false` — every endpoint is request/response.

stateful: false

