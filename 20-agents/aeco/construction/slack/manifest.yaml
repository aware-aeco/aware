agent:        slack
version:      0.2.0
sdk-target:   1.7.0
display-name: Slack Web API (raw)
description: |
  Auto-generated agent from Slack's public OpenAPI specification
  (`https://api.slack.com/specs/openapi/v2/slack_web.json`) via
  `aware build agent --from-openapi`. Reflects the vendor-published
  REST endpoint contract — 172 endpoints covering messaging
  (chat.postMessage, files.upload, conversations.create, …),
  workflow automation, app/admin operations, and audit trails.

  AECO use cases: notify channels on Tekla model events, post BCF
  issues from Trimble Connect, alert site PMs on Procore RFI updates,
  daily build summaries from Revit Coordinator workflows.

  Auth: supply a Slack bot (`xoxb-`) or user (`xoxp-`) token via the
  AWARE credential store. NOTE: `aware connect` does not yet wire Slack
  (only trimble-connect / microsoft-365 / google-workspace) — first-class
  `aware connect slack` is a separate task. Slack tokens carry the OAuth
  scopes that decide which endpoints the agent can call — match scopes to
  the workflow rather than over-requesting.

  Marked `stateful: false` — every endpoint is request/response.

stateful: false

vendor:   slack
license:  Apache-2.0
homepage: https://github.com/aware-aeco/aware/tree/main/20-agents/aeco/construction/slack
keywords: [aeco, construction, collaboration, messaging, slack, generated, raw, openapi, rest]

