name: Release

on:
  push:
    tags:
      # All v0.x and v1+ versions. The first pattern matches v0.0.x through
      # v0.99.x; the second matches v1.x and later majors. We used to enumerate
      # each minor (v0.6.*, v0.7.*, ...) but that broke at v0.10.0 — the new
      # patterns are forward-compatible.
      - 'v0.[0-9]*.*'
      - 'v[1-9]*.*.*'
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: .exe
            archive: zip
            archive_ext: .zip
          - os: ubuntu-latest
            rid: linux-x64
            ext: ""
            archive: tar
            archive_ext: .tar.gz
          - os: macos-latest
            rid: osx-arm64
            ext: ""
            archive: tar
            archive_ext: .tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Install clang on Linux
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y clang libsecret-1-dev libdbus-1-dev pkg-config

      - name: Sync crate version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "Syncing cli/Cargo.toml [package] version to $version"
          # Replace only the FIRST `version = "..."` line (the [package] version);
          # dependency version specs further down are left untouched. awk ships on
          # all three runners (incl. Git Bash on windows-latest), so this is portable
          # where BSD/GNU `sed -i` and `0,/re/` address ranges are not.
          awk -v v="$version" 'BEGIN{done=0} !done && /^version[[:space:]]*=/ {print "version     = \"" v "\""; done=1; next} {print}' cli/Cargo.toml > cli/Cargo.toml.tmp
          mv cli/Cargo.toml.tmp cli/Cargo.toml
          grep -m1 '^version' cli/Cargo.toml

      - name: Build Rust CLI (release)
        working-directory: cli
        run: cargo build --release

      - name: Publish C# sidecar (NativeAOT)
        run: dotnet publish cli-sidecar -c Release -r ${{ matrix.rid }} -p:PublishAot=true

      - name: Stage artifacts
        shell: bash
        run: |
          set -e
          version="${GITHUB_REF_NAME#v}"
          if [ -z "$version" ] || [[ ! "$version" =~ ^[0-9] ]]; then
            version="0.0.0-dev"
          fi
          stage="aware-${version}-${{ matrix.rid }}"
          mkdir -p "$stage"
          cp "cli/target/release/aware${{ matrix.ext }}" "$stage/"
          cp "cli-sidecar/bin/Release/net9.0/${{ matrix.rid }}/publish/aware-sidecar${{ matrix.ext }}" "$stage/"
          cp LICENSE "$stage/" 2>/dev/null || echo "(no LICENSE file)" > "$stage/LICENSE"
          cp cli/README.md "$stage/README.md"
          echo "$version" > "$stage/VERSION"
          ls -la "$stage/"
          echo "STAGE_DIR=$stage" >> $GITHUB_ENV
          echo "VERSION=$version" >> $GITHUB_ENV

      - name: Archive (Linux/macOS — tar.gz)
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          tar -czf "${{ env.STAGE_DIR }}.tar.gz" "${{ env.STAGE_DIR }}"
          ls -la *.tar.gz
          echo "ARTIFACT=${{ env.STAGE_DIR }}.tar.gz" >> $GITHUB_ENV

      - name: Archive (Windows — zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ env.STAGE_DIR }}" -DestinationPath "${{ env.STAGE_DIR }}.zip"
          Get-ChildItem *.zip
          "ARTIFACT=${{ env.STAGE_DIR }}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build MSI installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Pin WiX 6 — WiX 7+ added an Open Source Maintenance Fee EULA that
          # requires per-invocation acceptance, awkward in CI. WiX 6 is stable
          # and license-clean.
          dotnet tool install -g wix --version 6.0.0
          $msi = "${{ env.STAGE_DIR }}.msi"
          wix build packaging/wix/aware.wxs `
            -d Version=${{ env.VERSION }} `
            -d StageDir=${{ env.STAGE_DIR }} `
            -arch x64 `
            -o $msi
          Get-ChildItem $msi
          "MSI_ARTIFACT=$msi" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: aware-${{ env.VERSION }}-${{ matrix.rid }}
          path: ${{ env.ARTIFACT }}

      - name: Upload MSI artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: aware-${{ env.VERSION }}-win-x64-msi
          path: ${{ env.MSI_ARTIFACT }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    # Publishes via npm Trusted Publishing (OIDC) -- no long-lived token.
    # npm revoked the old NPM_TOKEN in its 2026 granular-token rotation
    # (Shai-Hulud supply-chain precaution), which is why 0.28.1 published but
    # 0.36.0 404'd with no repo change. Kept continue-on-error so a npm hiccup
    # can't fail the release -- the GitHub Release binaries are the primary
    # artifact. Safe to remove once trusted publishing is confirmed green.
    continue-on-error: true
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'   # trusted publishing needs Node >= 22.14.0
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - name: Ensure npm supports trusted publishing (>= 11.5.1)
        run: npm install -g npm@latest
      - name: Sync package.json version from tag
        working-directory: cli-npm
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "Syncing cli-npm/package.json to version $version"
          # Use Node to update version (avoids jq dependency)
          node -e "const pkg=require('./package.json'); pkg.version='$version'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n')"
          cat package.json
      - name: Publish to npm (OIDC trusted publishing -- no token)
        working-directory: cli-npm
        run: npm publish --access public --provenance
